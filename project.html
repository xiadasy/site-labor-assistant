<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17342f"><title>东方枢纽一标段 · 项目人员总管</title><style>:root{--ink:#152722;--deep:#17342f;--bg:#f2f4ef;--paper:#fffefa;--muted:#74807a;--line:#e0e6de;--green:#267663;--orange:#c96d29;--red:#b84f42}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 100% 0,#dcece3,transparent 34rem),var(--bg);color:var(--ink);font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,sans-serif;font-variant-numeric:tabular-nums}.top{background:linear-gradient(130deg,#17342f,#235248);padding:calc(15px + env(safe-area-inset-top)) max(16px,calc((100vw - 1180px)/2)) 18px;color:#fff}.crumb{font-size:11px;color:#b9d0c7;margin-bottom:8px}.head{display:flex;align-items:flex-start;gap:10px}.head h1{font-size:24px;letter-spacing:-.04em;margin:0}.head p{margin:6px 0 0;color:#c4d7d0;font-size:12px}.back{margin-left:auto;color:#e7f0eb;text-decoration:none;border:1px solid #ffffff30;border-radius:8px;padding:8px 10px;font-size:12px;white-space:nowrap}.wrap{max-width:1180px;margin:auto;padding:16px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:-31px}.metric{background:var(--paper);border:1px solid #fff;border-radius:13px;padding:14px;box-shadow:0 8px 22px #17342f12}.metric b{font-size:23px;display:block;letter-spacing:-.04em}.metric span{font-size:11px;color:var(--muted);display:block;margin-top:3px}.metric.emph b{color:var(--orange)}.filter{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px;margin:16px 0 12px;display:grid;grid-template-columns:1.5fr repeat(4,1fr);gap:8px;box-shadow:0 8px 22px #17342f09}input,select{width:100%;height:39px;border:1px solid var(--line);border-radius:8px;padding:0 10px;background:#fff;color:var(--ink);font:13px inherit}.hint{font-size:11px;color:var(--muted);margin:0 2px 12px}.unit{background:var(--paper);border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-bottom:13px;box-shadow:0 7px 18px #17342f08}.unit-head{padding:14px 15px 10px;display:flex;gap:9px;align-items:center}.unit-head i{width:5px;height:23px;background:var(--green);border-radius:4px}.unit-head b{font-size:16px}.unit-head small{color:var(--muted)}.unit-head strong{margin-left:auto;color:var(--orange);font-size:12px}.sub{padding:0 15px 12px;font-size:11px;color:var(--muted)}.table{overflow:auto;border-top:1px solid var(--line)}table{width:100%;min-width:980px;border-collapse:collapse}th,td{text-align:left;padding:10px 12px;border-top:1px solid #edf0eb;font-size:12px}th{border:0;background:#f6f8f4;color:#818b85;font-size:10px;font-weight:650}td:first-child,th:first-child{padding-left:15px}.name{border:0;background:none;color:var(--ink);font:700 12px inherit;padding:0;text-align:left}.name small{display:block;color:var(--muted);font-weight:400;margin-top:3px}.on{color:var(--green);font-weight:700}.off{color:var(--red);font-weight:700}.tag{font-size:10px;padding:3px 5px;border-radius:4px;background:#edf5f0;color:var(--green)}.drawer{position:fixed;inset:0;background:#10251d70;display:flex;align-items:flex-end;z-index:4}.hidden{display:none}.sheet{background:var(--paper);width:100%;max-height:87dvh;overflow:auto;border-radius:17px 17px 0 0;padding:19px 16px calc(20px + env(safe-area-inset-bottom))}.sheet h2{margin:0;font-size:22px}.close{float:right;border:0;background:#eaf0eb;border-radius:8px;width:36px;height:36px;color:var(--deep);font-size:20px}.profile{color:var(--muted);font-size:12px;margin:5px 0 16px}.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}.fact{padding:10px;border-bottom:1px solid var(--line)}.fact:nth-child(odd){border-right:1px solid var(--line)}.fact label{display:block;color:var(--muted);font-size:10px;margin-bottom:3px}.fact span{font-size:12px;word-break:break-all}.section{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin:20px 0 8px}.empty{padding:36px;text-align:center;color:var(--muted)}@media(max-width:680px){.metrics{grid-template-columns:repeat(2,1fr);margin-top:-18px;gap:8px}.metric{padding:12px}.filter{grid-template-columns:1fr 1fr}.filter input{grid-column:1/-1}.wrap{padding:12px}.top{padding-left:14px;padding-right:14px}.head h1{font-size:21px}}@media(min-width:760px){.drawer{align-items:center;justify-content:center}.sheet{width:640px;border-radius:15px;max-height:82vh}}</style></head><body><header class="top"><div class="crumb">项目总管 / 独立人员台账</div><div class="head"><div><h1>东方枢纽一标段</h1><p>项目人员总管 · 工人库主数据</p></div><a class="back" href="index.html">劳务助手</a><a class="back" href="company.html">本单位</a></div></header><main class="wrap"><section class="metrics"><div class="metric"><b id="total">—</b><span>项目总人数</span></div><div class="metric"><b id="active">—</b><span>当前已进场</span></div><div class="metric emph"><b id="managed">—</b><span>我管两家分包总人数</span></div><div class="metric emph"><b id="managedActive">—</b><span>我管两家当前在场</span></div></section><section class="filter"><input id="q" placeholder="搜索姓名、身份证、手机、班组、工种"><select id="unit"><option value="">全部单位</option></select><select id="status"><option value="">全部状态</option><option>已进场</option><option>已退场</option></select><select id="scope"><option value="">项目全部人员</option><option value="managed">只看我管两家分包</option></select><select id="team"><option value="">全部班组</option></select></section><p class="hint" id="hint">正在加载工人库数据…</p><div id="list"></div></main><div id="drawer" class="drawer hidden"><article class="sheet"><button class="close" id="close">×</button><h2 id="dn"></h2><p class="profile" id="ds"></p><div class="section">基本资料</div><div class="facts" id="facts"></div><div class="section">项目进场信息</div><div class="facts" id="project"></div><div class="section">体检辅助信息</div><div class="facts" id="medical"></div></article></div><script>const $=s=>document.querySelector(s),mask=(x,a=3,b=4)=>!x?'未录入':String(x).slice(0,a)+'********'+String(x).slice(-b);let data,people,shown;const managed=['上海共强建筑劳务有限公司','上海铭富建筑安装工程有限公司'];function val(x){return x||'未录入'}function facts(id,a){$(id).innerHTML=a.map(x=>`<div class="fact"><label>${x[0]}</label><span>${x[1]}</span></div>`).join('')}function detail(p){$('#dn').textContent=p.name;$('#ds').textContent=`${p.unit} · ${p.team||'未录入'} · ${p.status}`;facts('#facts',[['身份证号',mask(p.idCard,4,4)],['手机号',mask(p.phone)],['性别',val(p.sex)],['年龄',val(p.age)+' 岁'],['身份',val(p.role)],['工种/岗位',val(p.trade)]]);facts('#project',[['所属单位',val(p.unit)],['班组',val(p.team)],['进场时间',val(p.entryDate)],['当前状态',val(p.status)],['健康码',val(p.healthCode)],['门禁权限',val(p.access)]]);let m=p.medical;facts('#medical',m?[['体检类型',val(m.type)],['体检机构',val(m.organization)],['体检日期',val(m.date)],['有效截止',val(m.expiryDate)],['健康预警',val(m.warning)||'无'],['关联说明','体检表为辅助信息，待进一步匹配核验']]:[['体检状态','暂未关联'],['说明','项目人员主数据以工人库为准']]);$('#drawer').classList.remove('hidden')}function render(){let q=$('#q').value.trim().toLowerCase(),u=$('#unit').value,s=$('#status').value,t=$('#team').value,scope=$('#scope').value;shown=people.filter(p=>(!u||p.unit===u)&&(!s||p.status===s)&&(!t||p.team===t)&&(!scope||managed.includes(p.unit))&&(!q||[p.name,p.idCard,p.phone,p.team,p.trade].join(' ').toLowerCase().includes(q)));let groups={};shown.forEach(p=>(groups[p.unit]??=[]).push(p));$('#hint').textContent=`当前显示 ${shown.length.toLocaleString()} 人 · 可点击姓名查看完整项目档案`;$('#list').innerHTML=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([u,ps])=>`<section class="unit"><div class="unit-head"><i></i><b>${u}</b><small>${ps.length} 人</small><strong>${ps.filter(x=>x.status==='已进场').length} 在场</strong></div><div class="sub">班组 ${new Set(ps.map(x=>x.team).filter(Boolean)).size} 个 · 作业人员 ${ps.filter(x=>x.role==='作业人员').length} 人</div><div class="table"><table><thead><tr><th>姓名 / 工种</th><th>状态</th><th>班组</th><th>年龄</th><th>进场时间</th><th>手机</th><th>身份证</th></tr></thead><tbody>${ps.map(p=>`<tr><td><button class="name" data-id="${p.idCard}">${p.name}<small>${p.trade||'未录入'} · ${p.role||''}</small></button></td><td class="${p.status==='已进场'?'on':'off'}">${p.status}</td><td>${p.team||'未录入'}</td><td>${p.age||'—'} 岁</td><td>${p.entryDate||'未录入'}</td><td>${mask(p.phone)}</td><td>${mask(p.idCard,4,4)}</td></tr>`).join('')}</tbody></table></div></section>`).join('')||'<div class="empty">没有匹配人员</div>';document.querySelectorAll('[data-id]').forEach(e=>e.onclick=()=>detail(people.find(p=>p.idCard===e.dataset.id)))}async function init(){let x=await fetch('project-encrypted-data.json?'+Date.now()).then(r=>r.json()),raw=decodeURIComponent(escape(atob(x.payload)));data=JSON.parse(raw);people=data.people;let z=data.project.summary;$('#total').textContent=z.records.toLocaleString();$('#active').textContent=z.active.toLocaleString();$('#managed').textContent=z.managed.toLocaleString();$('#managedActive').textContent=z.managedActive.toLocaleString();let units=[...new Set(people.map(p=>p.unit))].sort(),teams=[...new Set(people.map(p=>p.team).filter(Boolean))].sort();$('#unit').innerHTML+units.map(x=>`<option>${x}</option>`).join('');$('#team').innerHTML+=teams.map(x=>`<option>${x}</option>`).join('');['q','unit','status','scope','team'].forEach(x=>$( '#'+x).oninput=render);['unit','status','scope','team'].forEach(x=>$('#'+x).onchange=render);render()}$('#close').onclick=()=>$('#drawer').classList.add('hidden');$('#drawer').onclick=e=>{if(e.target===$('#drawer'))$('#drawer').classList.add('hidden')};init().catch(e=>$('#hint').textContent='数据加载失败，请重新打开页面');</script></body></html>
