line);border-radius:9px;overflow:hidden;background:#fff}.fact{padding:10px;border-bottom:1px solid var(--line)}.fact:nth-child(odd){border-right:1px solid var(--line)}.fact label{display:block;color:var(--muted);font-size:10px;margin-bottom:3px}.fact span{font-size:12px;word-break:break-all}.section{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin:20px 0 8px}.empty{padding:36px;text-align:center;color:var(--muted)}.unit-toggle{margin-left:7px;border:0;background:#edf4ef;color:var(--green);border-radius:6px;padding:5px 8px;font-size:11px}.foldbar{display:flex;gap:8px;margin:0 0 12px}.foldbar button{height:34px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);padding:0 11px}.unit.collapsed .sub,.unit.collapsed .table{display:none}.tabs{display:flex;gap:4px;overflow:auto;border-bottom:1px solid var(--line);margin:15px 0 10px}.tab{border:0;background:transparent;padding:9px 11px;color:var(--muted);white-space:nowrap}.tab.on{color:#1686e8;border-bottom:2px solid #1686e8}.pane.hidden{display:none}.records{border:1px solid var(--line);border-radius:9px;overflow:hidden}.record{padding:10px;border-top:1px solid var(--line);font-size:12px}.record:first-child{border:0}.record b{display:block;margin-bottom:4px}.record span{color:var(--muted)}@media(max-width:680px){.metrics{grid-template-columns:repeat(2,1fr);margin-top:-18px;gap:8px}.metric{padding:12px}.filter{grid-template-columns:1fr 1fr}.filter input{grid-column:1/-1}.wrap{padding:12px}.top{padding-left:14px;padding-right:14px}.head h1{font-size:21px}}@media(min-width:760px){.drawer{align-items:center;justify-content:center}.sheet{width:640px;border-radius:15px;max-height:82vh}}</style></head><body><header class="top"><div class="crumb">项目总管 / 独立人员台账</div><div class="head"><div><h1>东方枢纽一标段</h1><p id="sourceMeta">项目人员总管 · 正在读取实时数据 · UI v24</p></div><div class="nav"><button class="eye" id="eye" title="显示完整信息"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg></button><a href="index.html">劳务助手</a><a href="company.html">本单位</a></div></div></header><main class="wrap"><section class="metrics"><div class="metric"><b id="total">—</b><span>项目总人数</span></div><div class="metric"><b id="active">—</b><span>当前已进场</span></div><div class="metric emph"><b id="managed">—</b><span>我管四个班组总人数</span></div><div class="metric emph"><b id="managedActive">—</b><span>我管四个班组当前在场</span></div></section><section class="filter"><input id="q" placeholder="搜索姓名、单位、身份证、手机、班组、工种"><select id="unit"><option value="">全部单位</option></select><select id="status"><option value="">全部状态</option><option>已进场</option><option>已退场</option></select><select id="scope"><option value="">项目全部人员</option><option value="managed">只看我管四个班组</option></select><select id="gender"><option value="">全部性别</option><option>男</option><option>女</option></select><select id="team"><option value="">全部班组</option></select></section><p class="hint" id="hint">正在加载工人库数据…</p><div class="foldbar"><button id="collapseAll">一键折叠全部单位</button><button id="expandAll">一键展开全部单位</button></div><div id="list"></div></main><div id="drawer" class="drawer hidden"><article class="sheet"><button class="close" id="close">×</button><h2 id="dn"></h2><p class="profile" id="ds"></p><div class="tabs"><button class="tab on" data-pane="basicPane">基本信息</button><button class="tab" data-pane="contractPane">劳动合同</button><button class="tab" data-pane="qualificationPane">资格证书</button><button class="tab" data-pane="servicePane">项目服务记录</button><button class="tab" data-pane="accessPane">门禁权限</button></div><div id="basicPane" class="pane"><div class="section">基本资料</div><div class="facts" id="facts"></div><div class="section">项目进场信息</div><div class="facts" id="project"></div><div class="section">体检辅助信息</div><div class="facts" id="medical"></div></div><div id="contractPane" class="pane hidden"><div class="records" id="contract"></div></div><div id="qualificationPane" class="pane hidden"><div class="records" id="qualification"></div></div><div id="servicePane" class="pane hidden"><div class="records" id="service"></div></div><div id="accessPane" class="pane hidden"><div class="records" id="accessDetail"></div></div></article></div><script>const $=s=>document.querySelector(s),maskId=(x,a=4,b=4)=>!x?'未录入':revealed?String(x):String(x).slice(0,a)+'********'+String(x).slice(-b),maskPhone=x=>!x?'未录入':revealed?String(x):String(x).slice(0,3)+'********'+String(x).slice(-4);let data,people,shown,revealed=false;const managedTeams=['黄卫华_2414班组','上海东站九分弱电班组','(有登高车操作证)上海东站九分弱电班组','(有登高车操作证)上海东站九分弱电黄卫华班组'];const eyeOpen='<svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>',eyeClosed='<svg viewBox="0 0 24 24"><path d="m3 3 18 18"/><path d="M10 5.2A11 11 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-2.2 3.2M6.6 6.6C3.6 8.5 2 12 2 12s3.5 7 10 7c1.8 0 3.3-.5 4.6-1.2"/></svg>';function val(x){return x||'未录入'}function facts(id,a){$(id).innerHTML=a.map(x=>`<div class="fact"><label>${x[0]}</label><span>${x[1]}</span></div>`).join('')}function detail(p){currentDetail=p;$('#dn').textContent=p.name;$('#ds').textContent=`${p.unit} · ${p.team||'未录入'} · ${p.status}`;facts('#facts',[['身份证号',val(p.idCard)],['手机号',val(p.phone)],['性别',val(p.sex)],['民族',val(p.nation)],['出生日期',val(p.birthday)],['年龄',val(p.age)+' 岁'],['身份证住址',val(p.address)],['发证机关',val(p.grantOrg)],['身份',val(p.role)],['工种/岗位',val(p.trade)],['开户银行',val(p.bankName)],['银行卡号',val(p.bankCard)]]);facts('#project',[['所属单位',val(p.unit)],['班组',val(p.team)],['进场时间',val(p.entryDate)],['当前状态',val(p.status)],['健康码',val(p.healthCode)],['门禁权限',val(p.access)]]);let m=p.medical;facts('#medical',m?[['体检类型',val(m.type)],['体检机构',val(m.organization)],['体检日期',val(m.date)],['有效截止',val(m.expiryDate)],['健康预警',val(m.warning)||'无'],['关联说明','体检表为辅助信息，待进一步匹配核验']]:[['体检状态','暂未关联'],['说明','项目人员主数据以工人库为准']]);$('#contract').innerHTML=`<div class="record"><b>劳动合同状态：${p.contractStatus||'未登记'}</b><span>${p.hasContract?'智慧工地已登记劳动合同':'实时主接口未返回合同登记记录'}</span></div>`;$('#qualification').innerHTML=`<div class="record"><b>资格证书状态：${p.qualificationStatus||'未登记'}</b><span>${p.hasQualification?'智慧工地已关联资格证书':'实时主接口未返回资格证书记录'}</span></div>`;$('#service').innerHTML=`<div class="record"><b>${p.unit}</b><span>项目：东方枢纽一标段<br>班组：${val(p.team)}<br>进场：${val(p.entryDate)}<br>退场：${val(p.exitDate)}<br>服务记录创建：${val(p.serviceCreatedAt)}<br>最近修改：${val(p.sourceModifiedAt)}</span></div>`;$('#accessDetail').innerHTML=`<div class="record"><b>门禁卡号：${val(p.accessCard)}</b><span>当前状态：${val(p.accessStatus)}<br>门禁信息来自智慧工地实时项目人员接口</span></div>`;document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('on',i===0));document.querySelectorAll('.pane').forEach((x,i)=>x.classList.toggle('hidden',i!==0));$('#drawer').classList.remove('hidden')}function render(){let q=$('#q').value.trim().toLowerCase(),u=$('#unit').value,s=$('#status').value,g=$('#gender').value,t=$('#team').value,scope=$('#scope').value;shown=people.filter(p=>(!u||p.unit===u)&&(!s||p.status===s)&&(!g||p.sex===g)&&(!t||p.team===t)&&(!scope||managedTeams.includes(p.team))&&(!q||[p.name,p.idCard,p.phone,p.unit,p.team,p.trade].join(' ').toLowerCase().includes(q)));let groups={};shown.forEach(p=>(groups[p.unit]??=[]).push(p));$('#hint').textContent=`当前显示 ${shown.length.toLocaleString()} 人 · 可点击姓名查看完整项目档案`;$('#list').innerHTML=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([u,ps])=>`<section class="unit"><div class="unit-head"><i></i><b>${u}</b><small>${ps.length} 人</small><button class="unit-toggle">折叠</button><strong>${ps.filter(x=>x.status==='已进场').length} 在场</strong></div><div class="sub">班组 ${new Set(ps.map(x=>x.team).filter(Boolean)).size} 个 · 作业人员 ${ps.filter(x=>x.role==='作业人员').length} 人</div><div class="table"><table><thead><tr><th>姓名 / 工种</th><th>状态</th><th>班组</th><th>年龄</th><th>进场时间</th><th>手机</th><th>身份证</th></tr></thead><tbody>${ps.map(p=>`<tr><td><button class="name" data-id="${p.idCard}">${p.name}<small>${p.trade||'未录入'} · ${p.role||''}</small></button></td><td class="${p.status==='已进场'?'on':'off'}">${p.status}</td><td>${p.team||'未录入'}</td><td>${p.age||'—'} 岁</td><td>${p.entryDate||'未录入'}</td><td>${maskPhone(p.phone)}</td><td>${maskId(p.idCard)}</td></tr>`).join('')}</tbody></table></div></section>`).join('')||'<div class="empty">没有匹配人员</div>';document.querySelectorAll('[data-id]').forEach(e=>e.onclick=()=>detail(people.find(p=>p.idCard===e.dataset.id)));document.querySelectorAll('.unit-toggle').forEach(b=>b.onclick=()=>{const u=b.closest('.unit');u.classList.toggle('collapsed');b.textContent=u.classList.contains('collapsed')?'展开':'折叠'})}async function init(){let x=await fetch('project-encrypted-data.json?'+Date.now()).then(r=>r.json()),raw=decodeURIComponent(escape(atob(x.payload)));data=JSON.parse(raw);people=data.people;$('#sourceMeta').textContent=`项目人员总管 · ${data.project.dataSource||'工人库数据'} · 更新 ${data.project.updatedAt} · UI v24`;let z=data.project.summary;$('#total').textContent=z.records.toLocaleString();$('#active').textContent=z.active.toLocaleString();$('#managed').textContent=z.managed.toLocaleString();$('#managedActive').textContent=z.managedActive.toLocaleString();let units=[...new Set(people.map(p=>p.unit))].sort(),teams=[...new Set(people.map(p=>p.team).filter(Boolean))].sort();$('#unit').innerHTML+=units.map(x=>`<option>${x}</option>`).join('');$('#team').innerHTML+=teams.map(x=>`<option>${x}</option>`).join('');['q','unit','status','scope','gender','team'].forEach(x=>$('#'+x).oninput=render);['unit','status','scope','team'].forEach(x=>$('#'+x).onchange=render);$('#eye').onclick=()=>{revealed=!revealed;$('#eye').innerHTML=revealed?eyeClosed:eyeOpen;render();let c=currentDetail;if(c)detail(c)};render()}let currentDetail=null;$('#collapseAll').onclick=()=>{document.querySelectorAll('.unit').forEach(u=>u.classList.add('collapsed'));document.querySelectorAll('.unit-toggle').forEach(b=>b.textContent='展开')};$('#expandAll').onclick=()=>{document.querySelectorAll('.unit').forEach(u=>u.classList.remove('collapsed'));document.querySelectorAll('.unit-toggle').forEach(b=>b.textContent='折叠')};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));document.querySelectorAll('.pane').forEach(x=>x.classList.toggle('hidden',x.id!==b.dataset.pane))});$('#close').onclick=()=>{$('#drawer').classList.add('hidden');currentDetail=null};$('#drawer').onclick=e=>{if(e.target===$('#drawer')){$('#drawer').classList.add('hidden');currentDetail=null}};init().catch(e=>$('#hint').textContent='数据加载失败，请重新打开页面');</script></body></html>
