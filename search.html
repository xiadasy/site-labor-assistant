<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#17342f"><title>人员快速搜索</title><style>*{box-sizing:border-box}body{margin:0;background:linear-gradient(130deg,#17342f,#235248);color:#fff;font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,sans-serif;font-variant-numeric:tabular-nums}.search-box{position:sticky;top:0;z-index:10;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;background:linear-gradient(130deg,#17342f,#214940);box-shadow:0 4px 18px #17342f40}input{width:100%;height:44px;border:1px solid #ffffff30;border-radius:10px;padding:0 14px;background:#ffffff13;color:#fff;font:16px inherit}input::placeholder{color:#a0b5ac}input:focus{outline:none;border-color:#26766355}.stats{display:flex;gap:10px;padding:10px 14px 6px;overflow-x:auto;scrollbar-width:none}.stats::-webkit-scrollbar{display:none}.stat{flex:0 0 auto;background:#ffffff13;border:1px solid #ffffff20;border-radius:9px;padding:8px 12px;text-align:center}.stat b{display:block;font-size:17px}.stat span{font-size:9px;color:#a0b5ac}.hint{text-align:center;color:#a0b5ac;font-size:12px;padding:8px 14px}.results{padding:0 10px calc(20px + env(safe-area-inset-bottom)) 10px}.card{background:rgba(255,254,250,.96);border:1px solid #fff;border-radius:13px;margin-bottom:9px;overflow:hidden;box-shadow:0 6px 16px #00000020;color:#152722}.card-head{padding:12px 14px 8px;display:flex;align-items:center;gap:9px;cursor:pointer}.card-head .avatar{width:38px;height:38px;border-radius:10px;background:#e8efe9;display:grid;place-items:center;color:#267663;font-size:16px;font-weight:800;flex:0 0 auto}.card-head .info{flex:1;min-width:0}.card-head .info b{font-size:15px;color:#152722}.card-head .info small{display:block;color:#74807a;font-size:11px;margin-top:2px}.card-head .badge{flex:0 0 auto;font-size:10px;padding:3px 7px;border-radius:5px;font-weight:700}.badge.on{background:#e8f3ed;color:#267663}.badge.off{background:#f9e9e6;color:#b84f42}.card-head .arrow{flex:0 0 auto;color:#74807a;font-size:14px;transition:.2s}.card.open .arrow{transform:rotate(180deg)}.card-body{display:none;padding:0 14px 14px}.card.open .card-body{display:block}.section{font-size:10px;font-weight:700;color:#74807a;letter-spacing:.05em;margin:14px 0 6px}.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid #e0e6de;border-radius:9px;overflow:hidden;background:#fff}.fact{padding:8px 10px;border-bottom:1px solid #edf0eb;font-size:11px}.fact:nth-child(odd){border-right:1px solid #edf0eb}.fact label{display:block;color:#74807a;font-size:9px;margin-bottom:2px}.fact span{word-break:break-all}.records{border:1px solid #e0e6de;border-radius:9px;overflow:hidden}.record{padding:8px 10px;border-top:1px solid #edf0eb;font-size:11px}.record:first-child{border:0}.record b{display:block;margin-bottom:3px}.record span{color:#74807a}.loading{text-align:center;padding:60px 20px;color:#a0b5ac}.spinner{display:inline-block;width:28px;height:28px;border:3px solid #ffffff30;border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}@keyframes spin{to{transform:rotate(360deg)}}.empty{text-align:center;padding:40px 20px;color:#a0b5ac}.tag{display:inline-block;padding:2px 5px;border-radius:4px;background:#edf5f0;color:#267663;font-size:9px;margin:1px}</style></head><body>
<div class="search-box"><input id="q" placeholder="输入姓名、身份证、手机、单位、班组、工种…" autofocus></div>
<div class="stats" id="stats"></div>
<div class="hint" id="hint">正在加载2619人数据…</div>
<div class="results" id="results"></div>
<script>
const $=s=>document.querySelector(s);let people=[],loaded=false;
function mask(x,a=4,b=4){return !x?'未录入':String(x).slice(0,a)+'****'+String(x).slice(-b)}
function maskPhone(x){return !x?'未录入':String(x).slice(0,3)+'****'+String(x).slice(-4)}
async function init(){
 const r=await fetch('project-encrypted-data.json?'+Date.now());
 const x=await r.json();
 const raw=decodeURIComponent(escape(atob(x.payload)));
 const data=JSON.parse(raw);
 people=data.people;
 loaded=true;
 $('#hint').textContent='共 '+people.length.toLocaleString()+' 人 · 输入姓名或关键词搜索';
 // stats
 const managed=['黄卫华_2414班组','上海东站九分弱电班组','(有登高车操作证)上海东站九分弱电班组','(有登高车操作证)上海东站九分弱电黄卫华班组'];
 const active=people.filter(p=>p.status==='已进场').length;
 const managedCount=people.filter(p=>managed.includes(p.team)).length;
 const managedActive=people.filter(p=>managed.includes(p.team)&&p.status==='已进场').length;
 const withCert=people.filter(p=>p.certificates&&p.certificates.length).length;
 $('#stats').innerHTML=[
  {b:people.length,s:'总人数'},{b:active,s:'已进场'},{b:managedCount,s:'我管班组'},{b:managedActive,s:'我管在场'},{b:withCert,s:'有证书'}
 ].map(x=>`<div class="stat"><b>${x.b.toLocaleString()}</b><span>${x.s}</span></div>`).join('');
 render();
}
function render(){
 if(!loaded){return}
 const q=$('#q').value.trim().toLowerCase();
 const shown=!q?people.slice(0,30):people.filter(p=>[p.name,p.idCard,p.phone,p.unit,p.team,p.trade].join(' ').toLowerCase().includes(q));
 $('#hint').textContent=q?('找到 '+shown.length.toLocaleString()+' 人'+(shown.length>50?' · 只显示前50':'')):('共 '+people.length.toLocaleString()+' 人 · 输入关键词搜索');
 const list=shown.slice(0,50);
 $('#results').innerHTML=list.map(p=>{
  const certs=(p.certificates||[]).map(c=>`<span class="tag">${c.name||c.className||''}</span>`).join('')||'';
  const contracts=(p.contracts||[]).map(c=>`<div class="record"><b>${c.type||'合同'}</b><span>${c.startDate||'?'} 至 ${c.endDate||'?'}</span></div>`).join('')||'<div class="record"><b>无合同记录</b></div>';
  const services=(p.services||[]).map(s=>`<div class="record"><b>${s.corpName||''}</b><span>${s.teamName||''} · ${s.trade||''}<br>进场 ${s.entryDate||'?'} · 退场 ${s.exitDate||'当前在场'}</span></div>`).join('')||'<div class="record"><b>无服务记录</b></div>';
  const certDetail=(p.certificates||[]).map(c=>`<div class="record"><b>${c.name||''} · ${c.typeName||''}</b><span>编号：${c.code||'未录入'}<br>有效期：${c.startDate||'?'} 至 ${c.endDate||'?'}</span></div>`).join('')||'<div class="record"><b>无证书</b></div>';
  const daily=(p.dailyAttendance||[]).slice(-5).reverse().map(d=>`<div class="record"><b>${d.time||'?'}</b><span>工时 ${d.laborHour||0}H · 进 ${d.inTime||'—'} · 离 ${d.outTime||'—'}</span></div>`).join('')||'<div class="record"><b>无考勤记录</b></div>';
  const monthly=(p.monthlyAttendance||[]).map(m=>`<div class="record"><b>${m.attendanceDate||'?'}</b><span>月度工时 ${m.laborHour||0}H</span></div>`).join('')||'<div class="record"><b>无月度考勤</b></div>';
  return `<div class="card"><div class="card-head" onclick="this.parentElement.classList.toggle('open')"><div class="avatar">${p.name?p.name[0]:'?'}</div><div class="info"><b>${p.name||'未录入'}</b><small>${p.unit||''} · ${p.trade||'未录入'} · ${p.team||''}</small></div><span class="badge ${p.status==='已进场'?'on':'off'}">${p.status||''}</span><span class="arrow">▾</span></div><div class="card-body"><div class="section">基本信息</div><div class="facts"><div class="fact"><label>姓名</label><span>${p.name||'未录入'}</span></div><div class="fact"><label>性别</label><span>${p.sex||'未录入'}</span></div><div class="fact"><label>年龄</label><span>${p.age||'—'}岁</span></div><div class="fact"><label>民族</label><span>${p.nation||'未录入'}</span></div><div class="fact"><label>身份证</label><span>${p.idCard||'未录入'}</span></div><div class="fact"><label>手机号</label><span>${p.phone||'未录入'}</span></div><div class="fact"><label>住址</label><span>${p.address||'未录入'}</span></div><div class="fact"><label>发证机关</label><span>${p.grantOrg||'未录入'}</span></div><div class="fact"><label>银行卡</label><span>${p.bankName||''} ${p.bankCard||'未录入'}</span></div><div class="fact"><label>工种</label><span>${p.trade||'未录入'}</span></div><div class="fact"><label>单位</label><span>${p.unit||''}</span></div><div class="fact"><label>班组</label><span>${p.team||''}</span></div><div class="fact"><label>进场时间</label><span>${p.entryDate||'未录入'}</span></div><div class="fact"><label>门禁卡号</label><span>${p.accessCard||'未录入'}</span></div></div><div class="section">劳动合同</div><div class="records">${contracts}</div><div class="section">资格证书</div><div class="records">${certDetail}</div><div class="section">项目服务记录</div><div class="records">${services}</div><div class="section">实时考勤（7月）</div><div class="records">${daily}</div><div class="section">月度考勤（7月）</div><div class="records">${monthly}</div></div></div>`;
 }).join('')||'<div class="empty">没有匹配人员</div>';
}
$('#q').oninput=render;
init().catch(e=>{$('#hint').textContent='数据加载失败，请刷新重试'});
</script></body></html>
