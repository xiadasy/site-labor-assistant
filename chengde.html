<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#26384b"><title>承德斐讯大数据项目 · 历史人员库</title><style>
:root{--ink:#17222d;--deep:#26384b;--blue:#356a91;--orange:#c96d29;--red:#b84f42;--green:#267663;--muted:#73808b;--line:#e1e7eb;--paper:#fff;--bg:#f1f4f6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang SC",-apple-system,BlinkMacSystemFont,sans-serif;font-variant-numeric:tabular-nums}.top{background:linear-gradient(135deg,#26384b,#35566f);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 15px 18px}.crumb{font-size:11px;color:#b9cad6;margin-bottom:8px}.head{display:flex;align-items:flex-start;gap:10px}.head h1{margin:0;font-size:22px;letter-spacing:-.035em}.head p{margin:5px 0 0;font-size:11px;color:#c6d4de}.back{margin-left:auto;flex:0 0 auto;color:#fff;text-decoration:none;border:1px solid #ffffff35;border-radius:9px;padding:8px 10px;font-size:12px}.wrap{max-width:1120px;margin:auto;padding:12px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:-18px}.metric{background:var(--paper);border:1px solid #fff;border-radius:13px;padding:12px;box-shadow:0 8px 18px #26384b12}.metric b{display:block;font-size:20px}.metric span{display:block;margin-top:3px;font-size:10px;color:var(--muted)}.metric.emph b{color:var(--orange)}.filter{margin:14px 0 10px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:10px;display:grid;grid-template-columns:1.6fr repeat(4,1fr);gap:8px}input,select{width:100%;height:39px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:0 10px;color:var(--ink);font:13px inherit}.hint{font-size:11px;color:var(--muted);margin:0 2px 10px}.foldbar{display:flex;gap:8px;margin-bottom:10px}.foldbar button,.unit-toggle{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--blue);padding:7px 10px;font-size:11px}.unit{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:11px;box-shadow:0 7px 18px #26384b0b}.unit-head{display:flex;align-items:center;gap:8px;padding:13px 14px 10px}.unit-head i{width:5px;height:23px;border-radius:4px;background:var(--blue)}.unit-head b{font-size:15px}.unit-head small{color:var(--muted)}.unit-head strong{margin-left:auto;color:var(--orange);font-size:12px}.sub{padding:0 14px 11px;color:var(--muted);font-size:11px}.table{overflow:auto;border-top:1px solid var(--line)}table{width:100%;min-width:930px;border-collapse:collapse}th,td{padding:10px 11px;border-top:1px solid #edf1f3;text-align:left;font-size:12px}th{border:0;background:#f6f8f9;color:#83909a;font-size:10px}.name{border:0;background:none;color:var(--ink);padding:0;text-align:left;font:700 12px inherit}.name small{display:block;margin-top:2px;color:var(--muted);font-weight:400}.on{color:var(--green);font-weight:700}.off{color:var(--red);font-weight:700}.unit.collapsed .sub,.unit.collapsed .table{display:none}.drawer{position:fixed;inset:0;z-index:20;background:#12202d77;backdrop-filter:blur(3px);display:flex;align-items:flex-end}.hidden{display:none!important}.sheet{width:100%;max-height:88dvh;overflow:auto;background:#fffefa;border-radius:18px 18px 0 0;padding:18px 15px calc(22px + env(safe-area-inset-bottom))}.sheet h2{margin:0;font-size:21px}.close{float:right;width:35px;height:35px;border:0;border-radius:9px;background:#e9eef1;color:var(--deep);font-size:20px}.profile{margin:5px 0 13px;color:var(--muted);font-size:12px}.tabs{display:flex;gap:4px;overflow:auto;border-bottom:1px solid var(--line);margin-bottom:10px}.tab{border:0;background:transparent;padding:9px 10px;white-space:nowrap;color:var(--muted)}.tab.on{color:var(--blue);border-bottom:2px solid var(--blue)}.section{margin:16px 0 7px;color:var(--muted);font-size:11px;font-weight:700}.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:10px;overflow:hidden}.fact{padding:9px;border-top:1px solid #edf1f3}.fact:nth-child(-n+2){border-top:0}.fact:nth-child(odd){border-right:1px solid #edf1f3}.fact label{display:block;color:var(--muted);font-size:9px;margin-bottom:2px}.fact span{font-size:12px;word-break:break-all}.records{border:1px solid var(--line);border-radius:10px;overflow:hidden}.record{padding:10px;border-top:1px solid #edf1f3;font-size:12px}.record:first-child{border-top:0}.record b{display:block;margin-bottom:3px}.record span{color:var(--muted)}.empty{text-align:center;padding:35px;color:var(--muted)}@media(max-width:680px){.metrics{grid-template-columns:repeat(2,1fr)}.filter{grid-template-columns:1fr 1fr}.filter input{grid-column:1/-1}.wrap{padding:10px}}@media(min-width:760px){.drawer{align-items:center;justify-content:center}.sheet{width:650px;border-radius:16px;max-height:84vh}}
</style></head><body>
<header class="top"><div class="crumb">历史项目 / 人员档案库</div><div class="head"><div><h1>承德斐讯大数据（一期）</h1><p id="meta">工程总承包 · 正在加载994人历史档案</p></div><a class="back" href="index.html">返回劳务助手</a></div></header>
<main class="wrap"><section class="metrics"><div class="metric"><b id="total">—</b><span>项目总人数</span></div><div class="metric emph"><b id="exit">—</b><span>已退场</span></div><div class="metric"><b id="units">—</b><span>单位</span></div><div class="metric"><b id="cert">—</b><span>有证书人员</span></div></section><section class="filter"><input id="q" placeholder="搜索姓名、身份证、手机、单位、班组、工种"><select id="unit"><option value="">全部单位</option></select><select id="status"><option value="">全部状态</option><option>已进场</option><option>已退场</option></select><select id="gender"><option value="">全部性别</option><option>男</option><option>女</option></select><select id="team"><option value="">全部班组</option></select></section><p class="hint" id="hint">正在读取历史人员库…</p><div class="foldbar"><button id="collapseAll">折叠全部单位</button><button id="expandAll">展开全部单位</button></div><div id="list"></div></main>
<div id="drawer" class="drawer hidden"><article class="sheet"><button class="close" id="close">×</button><h2 id="dn"></h2><p class="profile" id="ds"></p><div class="tabs"><button class="tab on" data-pane="basic">基本资料</button><button class="tab" data-pane="contract">劳动合同</button><button class="tab" data-pane="certs">资格证书</button><button class="tab" data-pane="service">项目服务</button></div><div id="basic" class="pane"></div><div id="contract" class="pane hidden"></div><div id="certs" class="pane hidden"></div><div id="service" class="pane hidden"></div></article></div>
<script>
const $=s=>document.querySelector(s);let data,people,shown,current=null;
const v=x=>x||'未录入';
function facts(items){return `<div class="facts">${items.map(x=>`<div class="fact"><label>${x[0]}</label><span>${v(x[1])}</span></div>`).join('')}</div>`}
function records(items,empty){return `<div class="records">${items.length?items.join(''):`<div class="record"><b>${empty}</b></div>`}</div>`}
function detail(p){current=p;$('#dn').textContent=p.name;$('#ds').textContent=`${p.unit} · ${p.team||'未录入班组'} · ${p.status}`;$('#basic').innerHTML=`<div class="section">身份与联系方式</div>${facts([['身份证',p.idCard],['手机号',p.phone],['性别/年龄',`${v(p.sex)} / ${p.age||'—'}岁`],['民族',p.nation],['出生日期',p.birthday],['身份证住址',p.address],['发证机关',p.grantOrg],['银行卡',`${p.bankName||''} ${p.bankCard||''}`],['工种',p.trade],['角色',p.role],['进场',p.entryDate],['退场',p.exitDate||'当前在场'],['门禁卡号',p.accessCard],['状态',p.status]])}`;$('#contract').innerHTML=`<div class="section">劳动合同</div>${records((p.contracts||[]).map(x=>`<div class="record"><b>${v(x.type)}</b><span>${v(x.startDate)} 至 ${v(x.endDate)}<br>${v(x.teamName)}</span></div>`),'无合同记录')}`;$('#certs').innerHTML=`<div class="section">资格证书</div>${records((p.certificates||[]).map(x=>`<div class="record"><b>${v(x.name)} · ${v(x.typeName)}</b><span>编号 ${v(x.code)}<br>有效期 ${v(x.startDate)} 至 ${v(x.endDate)}</span></div>`),'无证书记录')}`;$('#service').innerHTML=`<div class="section">历次项目服务</div>${records((p.services||[]).map(x=>`<div class="record"><b>${v(x.projectName)}</b><span>${v(x.corpName)} · ${v(x.teamName)} · ${v(x.trade)}<br>进场 ${v(x.entryDate)} · 退场 ${x.exitDate||'当前在场'}</span></div>`),'无服务记录')}`;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===0));document.querySelectorAll('.pane').forEach((x,i)=>x.classList.toggle('hidden',i!==0));$('#drawer').classList.remove('hidden')}
function render(){const q=$('#q').value.trim().toLowerCase(),u=$('#unit').value,s=$('#status').value,g=$('#gender').value,t=$('#team').value;shown=people.filter(p=>(!u||p.unit===u)&&(!s||p.status===s)&&(!g||p.sex===g)&&(!t||p.team===t)&&(!q||[p.name,p.idCard,p.phone,p.unit,p.team,p.trade].join(' ').toLowerCase().includes(q)));$('#hint').textContent=`当前显示 ${shown.length.toLocaleString()} 人 · 历史项目数据以最后同步为准`;const groups={};shown.forEach(p=>(groups[p.unit]??=[]).push(p));$('#list').innerHTML=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([u,ps])=>`<section class="unit"><div class="unit-head"><i></i><b>${u}</b><small>${ps.length}人</small><button class="unit-toggle">折叠</button><strong>${ps.filter(x=>x.status==='已退场').length} 已退</strong></div><div class="sub">班组 ${new Set(ps.map(x=>x.team).filter(Boolean)).size}个 · 有证书 ${ps.filter(x=>x.certificates?.length).length}人</div><div class="table"><table><thead><tr><th>姓名 / 工种</th><th>状态</th><th>单位</th><th>班组</th><th>进场</th><th>退场</th><th>手机号</th></tr></thead><tbody>${ps.map(p=>`<tr><td><button class="name" data-id="${p.projectWorkerId}">${p.name}<small>${p.trade||'未录入'} · ${p.sex||''} ${p.age||''}岁</small></button></td><td class="${p.status==='已进场'?'on':'off'}">${p.status}</td><td>${p.unit}</td><td>${p.team||'未录入'}</td><td>${p.entryDate||'—'}</td><td>${p.exitDate||'—'}</td><td>${p.phone||'未录入'}</td></tr>`).join('')}</tbody></table></div></section>`).join('')||'<div class="empty">没有匹配人员</div>';document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>detail(people.find(p=>p.projectWorkerId===b.dataset.id)));document.querySelectorAll('.unit-toggle').forEach(b=>b.onclick=()=>{const u=b.closest('.unit');u.classList.toggle('collapsed');b.textContent=u.classList.contains('collapsed')?'展开':'折叠'})}
async function init(){const x=await fetch('chengde-project-data.json?'+Date.now()).then(r=>r.json());data=JSON.parse(decodeURIComponent(escape(atob(x.payload))));people=data.people;const z=data.project.summary;$('#total').textContent=z.records.toLocaleString();$('#exit').textContent=z.exited.toLocaleString();$('#units').textContent=z.units;$('#cert').textContent=z.withCertificate;$('#meta').textContent=`工程总承包 · 已结束 · 更新 ${z.updatedAt}`;$('#unit').innerHTML+=[...new Set(people.map(p=>p.unit))].sort().map(x=>`<option>${x}</option>`).join('');$('#team').innerHTML+=[...new Set(people.map(p=>p.team).filter(Boolean))].sort().map(x=>`<option>${x}</option>`).join('');['q','unit','status','gender','team'].forEach(id=>$('#'+id).oninput=render);render()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b));document.querySelectorAll('.pane').forEach(x=>x.classList.toggle('hidden',x.id!==b.dataset.pane))});$('#close').onclick=()=>$('#drawer').classList.add('hidden');$('#drawer').onclick=e=>{if(e.target===$('#drawer'))$('#drawer').classList.add('hidden')};$('#collapseAll').onclick=()=>document.querySelectorAll('.unit').forEach(u=>u.classList.add('collapsed'));$('#expandAll').onclick=()=>document.querySelectorAll('.unit').forEach(u=>u.classList.remove('collapsed'));init().catch(()=>$('#hint').textContent='数据加载失败，请刷新');
</script></body></html>
