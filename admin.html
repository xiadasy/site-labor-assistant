<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>东方枢纽劳务助手·管理模式</title><style>
:root{--bg:#edf1ee;--panel:#fff;--text:#18211e;--muted:#6d7772;--line:#dbe2de;--green:#267a6a;--orange:#e77728;--red:#b84738}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}.hidden{display:none!important}button,input,select{font:inherit}button{cursor:pointer}.lock{position:fixed;inset:0;z-index:20;background:var(--bg);display:grid;place-items:center;padding:20px}.login{width:min(100%,420px);background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px}.login h1{font-size:21px;margin:0 0 6px}.login p{font-size:13px;line-height:1.6;color:var(--muted)}input,select{width:100%;height:40px;border:1px solid var(--line);border-radius:7px;padding:0 10px;background:#fff}.field{margin:10px 0}.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.btn{height:40px;border:1px solid var(--line);background:#fff;border-radius:7px;padding:0 12px;color:var(--text)}.primary{background:#1f2925;border-color:#1f2925;color:#fff}.danger{color:var(--red);border-color:#e4bbb5}.good{color:var(--green);border-color:#acd1c8}.top{position:sticky;top:0;z-index:8;background:rgba(248,250,248,.96);backdrop-filter:blur(15px);padding:calc(10px + env(safe-area-inset-top)) 12px 10px;border-bottom:1px solid var(--line)}.toprow{display:flex;align-items:center;gap:8px}.top h1{font-size:17px;margin:0}.top .actions{margin-left:auto;display:flex;gap:6px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.metric{background:#fff;border:1px solid var(--line);padding:8px;border-radius:7px}.metric b{display:block;font-size:18px}.metric small{font-size:10px;color:var(--muted)}main{max-width:1180px;margin:auto;padding:12px;display:grid;grid-template-columns:350px minmax(0,1fr);gap:12px}.panel{background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden}.panelhead{padding:10px;border-bottom:1px solid var(--line)}.filters{display:grid;grid-template-columns:110px 1fr;gap:7px}.people{max-height:calc(100dvh - 240px);overflow:auto}.person{width:100%;border:0;border-bottom:1px solid var(--line);background:#fff;text-align:left;padding:10px 11px}.person.on{background:#edf5f2}.person b{font-size:13px}.person span{float:right;font-size:11px}.person small{display:block;color:var(--muted);margin-top:3px}.active{color:var(--green)}.exit{color:var(--red)}.detail{padding:14px}.empty{padding:60px 20px;text-align:center;color:var(--muted)}.titlebar{display:flex;align-items:flex-start;gap:8px}.titlebar h2{margin:0;font-size:21px}.titlebar .ops{margin-left:auto;display:flex;gap:6px}.section{margin-top:18px}.section h3{font-size:12px;color:var(--muted);margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.timeline{border:1px solid var(--line);border-radius:7px}.event{display:flex;padding:8px 10px;border-bottom:1px solid var(--line);font-size:12px}.event:last-child{border:0}.event b{width:70px}.event span{margin-left:auto;color:var(--muted)}table{width:100%;border-collapse:collapse}th,td{border:1px solid var(--line);padding:7px;font-size:11px;text-align:left}th{color:var(--muted);font-weight:500}td input,td select{height:34px}.cert{padding:9px;border:1px solid var(--line);border-radius:7px;margin-bottom:7px;font-size:12px}.cert small{color:var(--muted)}.upload{border:1px dashed #aebbb5;border-radius:8px;padding:10px}.status{position:fixed;left:12px;right:12px;bottom:calc(8px + env(safe-area-inset-bottom));max-width:700px;margin:auto;background:#1f2925;color:#fff;border-radius:8px;padding:9px 12px;font-size:12px;opacity:0;pointer-events:none;transition:.2s}.status.show{opacity:.96}.status.bad{background:var(--red)}@media(max-width:760px){main{grid-template-columns:1fr}.people{max-height:320px}.summary{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr 1fr}.titlebar{display:block}.titlebar .ops{margin:10px 0 0}.toprow{flex-wrap:wrap}.top .actions{width:100%;margin:4px 0 0}.top .actions button{flex:1}}</style></head><body>
<div id="lock" class="lock"><form id="login" class="login"><h1>管理模式</h1><p>查询密码只在本机解密数据；管理令牌只在保存时验证。人员进退场将记录为事件，不覆盖历史。</p><div class="field"><label>查询密码</label><input id="password" type="password" autocomplete="current-password" required></div><div class="field"><label>管理服务地址（已固定）</label><input id="apiBase" readonly></div><div class="field"><label>管理令牌</label><input id="adminToken" type="password" autocomplete="off" placeholder="保存和上传时使用"></div><button class="btn primary" style="width:100%">解锁管理</button><p id="loginMsg"></p></form></div>
<div id="app" class="hidden"><header class="top"><div class="toprow"><h1>东方枢纽劳务助手 · 管理模式</h1><div class="actions"><button id="backBtn" class="btn">返回查询</button><button id="addPersonBtn" class="btn good">新增人员</button><button id="importRosterBtn" class="btn">导入花名册</button><button id="importPayrollBtn" class="btn">导入工资</button><button id="exportBtn" class="btn">导出备份</button><button id="saveBtn" class="btn primary">保存并同步</button></div></div><div id="summary" class="summary"></div></header><main><aside class="panel"><div class="panelhead"><div class="filters"><select id="unitFilter"></select><input id="search" placeholder="姓名、身份证、手机号、工种"></div></div><div id="people" class="people"></div></aside><section class="panel"><div id="detail" class="detail empty">请选择人员</div></section></main></div><div id="status" class="status"></div><input id="rosterFile" type="file" accept=".xlsx,.xls,.csv" class="hidden"><input id="payrollFile" type="file" accept=".xlsx,.xls,.csv" class="hidden">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const $=s=>document.querySelector(s),clone=x=>JSON.parse(JSON.stringify(x)),today=()=>new Date().toISOString().slice(0,10),money=n=>Number(n||0).toLocaleString('zh-CN');
const API_BASE='https://dongfang-labor-admin.a15221082942.workers.dev';const A={raw:null,data:null,password:'',apiBase:API_BASE,token:localStorage.getItem('laborAdminToken')||'',unit:'all',personId:'',dirty:false};
$('#apiBase').value=A.apiBase;$('#adminToken').value=A.token;
function toast(msg,bad=false){const e=$('#status');e.textContent=msg;e.className='status show'+(bad?' bad':'');clearTimeout(toast.t);toast.t=setTimeout(()=>e.className='status',3500)}
function b64(u){let s='';for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode(...u.slice(i,i+8192));return btoa(s)}function fromB64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function keyFor(pw,salt,uses){const m=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,uses)}
async function decryptEnvelope(e,pw){const k=await keyFor(pw,fromB64(e.salt),['decrypt']),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(e.iv)},k,fromB64(e.ciphertext));return JSON.parse(new TextDecoder().decode(plain))}
async function encryptEnvelope(data,pw){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),k=await keyFor(pw,salt,['encrypt']),plain=new TextEncoder().encode(JSON.stringify(data)),ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},k,plain));return{version:1,algorithm:'AES-GCM',kdf:'PBKDF2-SHA256',iterations:210000,salt:b64(salt),iv:b64(iv),ciphertext:b64(ct)}}
async function encryptFile(file,pw){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),k=await keyFor(pw,salt,['encrypt']),plain=await file.arrayBuffer(),ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},k,plain)),out=new Uint8Array(28+ct.length);out.set(salt,0);out.set(iv,16);out.set(ct,28);return out}
function base(){return A.apiBase.replace(/\/$/,'')}async function loadEnvelope(){const urls=[];if(A.apiBase)urls.push(base()+'/api/state?t='+Date.now());urls.push('encrypted-data.json?t='+Date.now());for(const url of urls){try{const r=await fetch(url,{cache:'no-store'});if(r.ok)return JSON.parse(await r.text())}catch(e){}}throw new Error('无法读取加密数据')}
function normalize(d){d.units=d.units||[];for(const u of d.units){u.people=u.people||[];for(const p of u.people){p.payrollHistory=p.payrollHistory||[];p.certificates=p.certificates||[];if(!Array.isArray(p.statusHistory)){p.statusHistory=[];if(p.entryDate)p.statusHistory.push({type:'entry',date:p.entryDate,createdAt:p.entryDate});if(p.exitDate)p.statusHistory.push({type:'exit',date:p.exitDate,createdAt:p.exitDate})}}}return d}
function allPeople(){return A.data.units.flatMap(u=>u.people.map(p=>({u,p})))}function currentPerson(){return allPeople().find(x=>x.p.idCard===A.personId)}
function statusOf(p){const h=p.statusHistory||[],last=h[h.length-1];return last?(last.type==='exit'?'退场':'在场'):(p.status||'在场')}
function derive(){const months=new Set;for(const u of A.data.units){const map={};for(const p of u.people){p.status=statusOf(p);for(const x of p.payrollHistory){if(!x.month)continue;months.add(x.month);const m=map[x.month]||(map[x.month]={month:x.month,expectedTotal:0,paidTotal:0,peopleCount:0,status:'待发放'});m.expectedTotal+=Number(x.expectedAmount??x.amount??0);m.paidTotal+=Number(x.paidAmount??(x.status==='已发放'?(x.amount||0):0));m.peopleCount++}}u.payrollHistory=Object.values(map).sort((a,b)=>b.month.localeCompare(a.month));for(const x of u.payrollHistory)x.status=x.expectedTotal&&x.paidTotal===x.expectedTotal?'已发放':x.paidTotal>0?'部分成功':'待发放'}A.data.availableMonths=[...months].sort().reverse()}
function summary(){derive();const people=allPeople().map(x=>x.p);return{version:1,project:'东方枢纽工程',updatedAt:A.data.project.updatedAt,rosterVersion:A.data.project.rosterVersion,records:people.length,active:people.filter(p=>p.status==='在场').length,focusOver55:people.filter(p=>{const s=p.idCard||'';if(!/^\d{17}[\dX]$/.test(s))return false;return new Date().getFullYear()-Number(s.slice(6,10))>55}).length,certificateCount:people.reduce((s,p)=>s+p.certificates.length,0),certifiedPeople:people.filter(p=>p.certificates.length).length,units:A.data.units.map(u=>({id:u.id,name:u.name,records:u.people.length,active:u.people.filter(p=>p.status==='在场').length,certificateCount:u.people.reduce((s,p)=>s+p.certificates.length,0),payrollHistory:u.payrollHistory}))}}
function dirty(){A.dirty=true;$('#saveBtn').textContent='保存并同步 ●';localStorage.setItem('laborAdminDraft',JSON.stringify(A.data));renderSummary()}
function renderSummary(){const s=summary();$('#summary').innerHTML=[[s.records,'人员档案'],[s.active,'当前在场'],[s.certificateCount,'关联证书'],[(A.data.availableMonths||[]).length,'工资月份']].map(x=>`<div class="metric"><b>${x[0]}</b><small>${x[1]}</small></div>`).join('')}
function renderFilters(){const old=A.unit;$('#unitFilter').innerHTML='<option value="all">全部单位</option>'+A.data.units.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');$('#unitFilter').value=old}
function renderPeople(){const q=$('#search').value.trim().toLowerCase(),rows=allPeople().filter(x=>(A.unit==='all'||x.u.id===A.unit)&&(!q||[x.p.name,x.p.idCard,x.p.phone,x.p.trade].join(' ').toLowerCase().includes(q)));$('#people').innerHTML=rows.map(({u,p})=>`<button class="person ${A.personId===p.idCard?'on':''}" data-id="${p.idCard}"><b>${p.name}</b><span class="${statusOf(p)==='在场'?'active':'exit'}">${statusOf(p)}</span><small>${u.name} · ${p.trade||'未录入'} · ${p.certificates.length}本证书</small></button>`).join('')||'<div class="empty">无匹配人员</div>';document.querySelectorAll('.person[data-id]').forEach(b=>b.onclick=()=>{A.personId=b.dataset.id;renderPeople();renderDetail()})}
function field(k,label,p,type='text'){return`<div class="field"><label>${label}</label><input data-field="${k}" type="${type}" value="${String(p[k]??'').replaceAll('"','&quot;')}"></div>`}
function renderDetail(){const x=currentPerson();if(!x){$('#detail').className='detail empty';$('#detail').innerHTML='请选择人员';return}const{u,p}=x,events=(p.statusHistory||[]).slice().reverse(),pays=[...p.payrollHistory].sort((a,b)=>b.month.localeCompare(a.month));$('#detail').className='detail';$('#detail').innerHTML=`<div class="titlebar"><div><h2>${p.name}</h2><small>${u.name} · ${p.trade||''} · <b class="${statusOf(p)==='在场'?'active':'exit'}">${statusOf(p)}</b></small></div><div class="ops"><button id="entryBtn" class="btn good">办理进场</button><button id="exitBtn" class="btn danger">办理退场</button></div></div><div class="section"><h3>人员资料</h3><div class="grid">${field('name','姓名',p)}${field('trade','工种',p)}${field('idCard','身份证',p)}${field('phone','手机号',p)}${field('bankCard','银行卡',p)}${field('bank','开户行',p)}${field('dailyRate','日薪',p,'number')}${field('medicalDate','体检日期',p,'date')}${field('address','地址',p)}</div></div><div class="section"><h3>进退场历史（最后一条事件决定当前状态）</h3><div class="timeline">${events.map(e=>`<div class="event"><b class="${e.type==='entry'?'active':'exit'}">${e.type==='entry'?'进场':'退场'}</b>${e.date}<span>${e.note||''}</span></div>`).join('')||'<div class="event">暂无事件</div>'}</div></div><div class="section"><div class="titlebar"><h3>工资历史</h3><div class="ops"><button id="addPayBtn" class="btn">新增月份</button></div></div><table><thead><tr><th>月份</th><th>应发</th><th>实发</th><th>状态</th><th></th></tr></thead><tbody>${pays.map((y,i)=>`<tr data-pay="${p.payrollHistory.indexOf(y)}"><td><input data-payfield="month" type="month" value="${y.month}"></td><td><input data-payfield="expectedAmount" type="number" value="${y.expectedAmount??y.amount??0}"></td><td><input data-payfield="paidAmount" type="number" value="${y.paidAmount??0}"></td><td><select data-payfield="status">${['待发放','已发放','发放失败','部分成功'].map(s=>`<option ${y.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="btn danger delpay">删</button></td></tr>`).join('')||'<tr><td colspan="5">暂无工资</td></tr>'}</tbody></table></div><div class="section"><h3>证书原件（浏览器先加密，再上传）</h3>${p.certificates.map(c=>`<div class="cert"><b>${c.type||'证书'}</b> · ${c.number||'未录编号'}<br><small>${c.issuer||''} ${c.issueDate||''} 至 ${c.expiryDate||''}</small></div>`).join('')||'<div class="cert">暂无证书</div>'}<div class="upload"><div class="grid"><div class="field"><label>证书类型</label><input id="certType"></div><div class="field"><label>证书编号</label><input id="certNo"></div><div class="field"><label>发证机关</label><input id="certIssuer"></div><div class="field"><label>发证日期</label><input id="certIssue" type="date"></div><div class="field"><label>有效期</label><input id="certExpiry" type="date"></div><div class="field"><label>PDF原件</label><input id="certFile" type="file" accept="application/pdf"></div></div><button id="uploadBtn" class="btn">加密并上传证书</button></div></div>`;bindDetail(p)}
function bindDetail(p){document.querySelectorAll('[data-field]').forEach(e=>e.onchange=()=>{p[e.dataset.field]=e.type==='number'?Number(e.value):e.value;dirty();renderPeople()});$('#entryBtn').onclick=()=>move(p,'entry');$('#exitBtn').onclick=()=>move(p,'exit');$('#addPayBtn').onclick=()=>{const m=prompt('工资月份 YYYY-MM',new Date().toISOString().slice(0,7));if(!/^\d{4}-\d{2}$/.test(m||''))return;p.payrollHistory.push({month:m,amount:0,expectedAmount:0,paidAmount:0,status:'待发放'});dirty();renderDetail()};document.querySelectorAll('[data-pay]').forEach(row=>{const idx=Number(row.dataset.pay);row.querySelectorAll('[data-payfield]').forEach(e=>e.onchange=()=>{p.payrollHistory[idx][e.dataset.payfield]=e.type==='number'?Number(e.value):e.value;dirty();renderSummary()});row.querySelector('.delpay').onclick=()=>{if(confirm('删除该月个人工资记录？')){p.payrollHistory.splice(idx,1);dirty();renderDetail()}}});$('#uploadBtn').onclick=()=>uploadCert(p)}
function move(p,type){const d=prompt(type==='entry'?'进场日期 YYYY-MM-DD':'退场日期 YYYY-MM-DD',today());if(!/^\d{4}-\d{2}-\d{2}$/.test(d||''))return;const note=prompt('备注（可留空）','')||'';p.statusHistory=p.statusHistory||[];p.statusHistory.push({type,date:d,note,createdAt:new Date().toISOString()});if(type==='entry'){p.status='在场';p.entryDate=d;p.exitDate=''}else{p.status='退场';p.exitDate=d}dirty();renderPeople();renderDetail();toast(type==='entry'?'已记录进场，等待同步':'已记录退场，等待同步')}
async function uploadCert(p){const f=$('#certFile').files[0];if(!f)return toast('请选择PDF文件',true);if(!A.apiBase||!A.token)return toast('请先配置管理服务地址和管理令牌',true);try{toast('正在本机加密证书…');const bytes=await encryptFile(f,A.password),name=Array.from(crypto.getRandomValues(new Uint8Array(12)),x=>x.toString(16).padStart(2,'0')).join('')+'.bin',r=await fetch(base()+'/api/cert/'+name,{method:'PUT',headers:{Authorization:'Bearer '+A.token,'Content-Type':'application/octet-stream'},body:bytes});if(!r.ok)throw new Error((await r.text()).slice(0,200));p.certificates.push({type:$('#certType').value||'证书',number:$('#certNo').value,operation:'',issuer:$('#certIssuer').value,issueDate:$('#certIssue').value,expiryDate:$('#certExpiry').value,sourceFile:f.name,attachment:'cert-files/'+name,attachmentType:'application/pdf',attachmentSize:bytes.length});dirty();renderDetail();toast('证书密文已上传，请保存人员数据')}catch(e){toast('证书上传失败：'+e.message,true)}}
async function readSheetRows(file){if(!window.XLSX)throw new Error('Excel解析库未加载，请联网后重试');const buf=await file.arrayBuffer(),wb=XLSX.read(buf,{type:'array',cellDates:false});const out=[];for(const name of wb.SheetNames){const rows=XLSX.utils.sheet_to_json(wb.Sheets[name],{defval:'',raw:false});for(const r of rows)out.push({sheet:name,row:r})}return out}
function val(row,names){const keys=Object.keys(row);for(const n of names){const hit=keys.find(k=>String(k).replace(/\s/g,'').includes(n));if(hit)return String(row[hit]??'').trim()}return''}
function unitByText(text){const s=String(text||'');if(s.includes('共强'))return'gongqiang';if(s.includes('铭富'))return'mingfu';return''}
function findUnit(id){return A.data.units.find(u=>u.id===id)||A.data.units[0]}
function personById(id){return allPeople().find(x=>x.p.idCard===id)}
function personByName(unitId,name){const rows=allPeople().filter(x=>(!unitId||x.u.id===unitId)&&x.p.name===name);return rows.length===1?rows[0]:null}
function normalizeRosterRow(x){const r=x.row,unit=unitByText(val(r,['单位','班组','劳务公司'])||x.sheet);return{unitId:unit,name:val(r,['姓名','工人姓名']),sex:val(r,['性别']),trade:val(r,['工种','岗位']),idCard:val(r,['身份证号','身份证','证件号码','证件号']).toUpperCase(),phone:val(r,['手机号','电话','联系方式']),bankCard:val(r,['银行卡号','银行卡','账号']),bank:val(r,['开户行','银行']),dailyRate:Number((val(r,['日薪','日工资','工资标准'])||'').replace(/[^0-9.]/g,''))||'',entryDate:val(r,['进场日期','进场时间','入场日期']),exitDate:val(r,['退场日期','退场时间']),medicalDate:val(r,['体检日期','体检时间'])}}
async function importRoster(file){try{const rows=(await readSheetRows(file)).map(normalizeRosterRow).filter(r=>r.name&&(r.idCard||r.phone));const news=[],updates=[],reentries=[],conflicts=[];for(const r of rows){const hit=r.idCard?personById(r.idCard):personByName(r.unitId,r.name);if(hit){if(statusOf(hit.p)==='退场')reentries.push({hit,r});else updates.push({hit,r})}else{const same=allPeople().filter(x=>x.p.name===r.name);if(same.length&&r.idCard)conflicts.push(r);else news.push(r)}}const msg=`花名册导入预览\n\n识别人员：${rows.length}\n新增人员：${news.length}\n资料更新：${updates.length}\n重新进场：${reentries.length}\n疑似同名冲突：${conflicts.length}\n\n确认后只写入内存，还需点击“保存并同步”。`;if(!confirm(msg))return;for(const r of news){const u=findUnit(r.unitId);const p={name:r.name,sex:r.sex,trade:r.trade,idCard:r.idCard,phone:r.phone,address:'',bankCard:r.bankCard,bank:r.bank,dailyRate:r.dailyRate,entryDate:r.entryDate||today(),exitDate:'',medicalDate:r.medicalDate,status:'在场',statusHistory:[{type:'entry',date:r.entryDate||today(),note:'花名册导入',createdAt:new Date().toISOString()}],payrollHistory:[],certificates:[]};u.people.push(p)}for(const item of updates){Object.entries(item.r).forEach(([k,v])=>{if(v&&k!=='unitId')item.hit.p[k]=v})}for(const item of reentries){Object.entries(item.r).forEach(([k,v])=>{if(v&&k!=='unitId')item.hit.p[k]=v});item.hit.p.statusHistory=item.hit.p.statusHistory||[];item.hit.p.statusHistory.push({type:'entry',date:item.r.entryDate||today(),note:'花名册重新进场',createdAt:new Date().toISOString()});item.hit.p.status='在场';item.hit.p.entryDate=item.r.entryDate||today();item.hit.p.exitDate=''}dirty();renderFilters();renderSummary();renderPeople();toast(`花名册已导入：新增${news.length}，更新${updates.length}，重新进场${reentries.length}`)}catch(e){toast('花名册导入失败：'+e.message,true)}}
function normalizePayrollRow(x,month,defStatus){const r=x.row,unit=unitByText(val(r,['单位','班组','劳务公司'])||x.sheet),expected=Number((val(r,['应发','发放工资','工资合计','合计','金额'])||'').replace(/[^0-9.\-]/g,''))||0,paidRaw=val(r,['实发','实际发放','已发','付款金额']),paid=paidRaw?Number(paidRaw.replace(/[^0-9.\-]/g,''))||0:(defStatus==='已发放'?expected:0),status=val(r,['状态','发放状态'])||defStatus||((paid>0&&paid===expected)?'已发放':paid>0?'部分成功':'待发放');return{unitId:unit,month,name:val(r,['姓名','工人姓名']),idCard:val(r,['身份证号','身份证','证件号码','证件号']).toUpperCase(),expectedAmount:expected,paidAmount:paid,status}}
async function importPayroll(file){try{const month=prompt('工资月份 YYYY-MM',new Date().toISOString().slice(0,7));if(!/^\d{4}-\d{2}$/.test(month||''))return;const defStatus=prompt('默认发放状态：待发放 / 已发放 / 发放失败','待发放')||'待发放';const rows=(await readSheetRows(file)).map(x=>normalizePayrollRow(x,month,defStatus)).filter(r=>r.name&&(r.expectedAmount||r.paidAmount));const matched=[],unmatched=[];for(const r of rows){const hit=r.idCard?personById(r.idCard):personByName(r.unitId,r.name);if(hit)matched.push({hit,r});else unmatched.push(r)}const exp=matched.reduce((s,x)=>s+x.r.expectedAmount,0),paid=matched.reduce((s,x)=>s+x.r.paidAmount,0),msg=`工资导入预览\n\n月份：${month}\n识别记录：${rows.length}\n成功匹配：${matched.length}\n未匹配：${unmatched.length}\n应发合计：¥${money(exp)}\n实发合计：¥${money(paid)}\n\n确认后只写入内存，还需点击“保存并同步”。`;if(!confirm(msg))return;for(const {hit,r} of matched){const list=hit.p.payrollHistory||[],old=list.find(x=>x.month===month);const item={month,amount:r.expectedAmount,expectedAmount:r.expectedAmount,paidAmount:r.paidAmount,status:r.status};if(old)Object.assign(old,item);else list.push(item);hit.p.payrollHistory=list}dirty();renderSummary();renderPeople();if(currentPerson())renderDetail();toast(`工资已导入：匹配${matched.length}，未匹配${unmatched.length}`)}catch(e){toast('工资导入失败：'+e.message,true)}}
function addPerson(){const unitName=prompt('单位：共强 / 铭富','共强');if(!unitName)return;const u=findUnit(unitByText(unitName));const name=prompt('姓名','');if(!name)return;const idCard=(prompt('身份证','')||'').toUpperCase();if(idCard&&personById(idCard))return toast('该身份证已存在，请用重新进场或编辑原档案',true);const p={name,idCard,sex:'',trade:prompt('工种','普工')||'',phone:prompt('手机号','')||'',address:'',bankCard:'',bank:'',dailyRate:Number(prompt('日薪','')||0)||'',entryDate:prompt('进场日期 YYYY-MM-DD',today())||today(),exitDate:'',medicalDate:'',status:'在场',statusHistory:[],payrollHistory:[],certificates:[]};p.statusHistory.push({type:'entry',date:p.entryDate,note:'手工新增',createdAt:new Date().toISOString()});u.people.push(p);A.personId=p.idCard;dirty();renderFilters();renderSummary();renderPeople();renderDetail();toast('新增人员已写入内存，请保存并同步')}
async function save(){if(!A.token)return toast('管理令牌为空：请退出管理页，重新粘贴管理令牌后解锁',true);try{toast('正在本机加密并同步…');derive();A.data.project.updatedAt=new Date().toLocaleString('zh-CN',{hour12:false});const envelope=await encryptEnvelope(A.data,A.password),sum=summary(),r=await fetch(API_BASE+'/api/state',{method:'POST',headers:{Authorization:'Bearer '+A.token,'Content-Type':'application/json'},body:JSON.stringify({encryptedData:envelope,widgetSummary:sum,auditSummary:{records:sum.records,active:sum.active,updatedAt:A.data.project.updatedAt}})});if(!r.ok){const body=(await r.text()).slice(0,240);if(r.status===401)throw new Error('管理令牌不正确，请重新进入并粘贴最新令牌');throw new Error(`服务返回 ${r.status}：${body}`)}A.raw=envelope;A.dirty=false;$('#saveBtn').textContent='保存并同步';localStorage.removeItem('laborAdminDraft');toast('人员、工资和挂件汇总已加密同步')}catch(e){toast('同步失败：'+(e.message||'网络连接失败，请重试'),true)}}
async function exportBackup(){try{derive();const env=await encryptEnvelope(A.data,A.password),blob=new Blob([JSON.stringify(env)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='encrypted-data-backup-'+today()+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);toast('已导出加密备份')}catch(e){toast(e.message,true)}}
$('#login').onsubmit=async e=>{e.preventDefault();$('#loginMsg').textContent='正在读取并解密…';try{A.password=$('#password').value;A.apiBase=API_BASE;A.token=$('#adminToken').value.trim();localStorage.setItem('laborApiBase',API_BASE);localStorage.setItem('laborAdminToken',A.token);A.raw=await loadEnvelope();A.data=normalize(await decryptEnvelope(A.raw,A.password));const draft=localStorage.getItem('laborAdminDraft');if(draft&&confirm('发现本机未同步草稿，是否恢复？')){A.data=normalize(JSON.parse(draft));A.dirty=true}$('#lock').classList.add('hidden');$('#app').classList.remove('hidden');renderFilters();renderSummary();renderPeople();toast(A.apiBase?'管理模式已解锁':'查询数据已解锁，云端服务待配置')}catch(err){$('#loginMsg').textContent='解锁失败：密码错误或数据不可用'}};
$('#unitFilter').onchange=e=>{A.unit=e.target.value;renderPeople()};$('#search').oninput=renderPeople;$('#addPersonBtn').onclick=addPerson;$('#importRosterBtn').onclick=()=>$('#rosterFile').click();$('#importPayrollBtn').onclick=()=>$('#payrollFile').click();$('#rosterFile').onchange=e=>{const f=e.target.files[0];if(f)importRoster(f);e.target.value=''};$('#payrollFile').onchange=e=>{const f=e.target.files[0];if(f)importPayroll(f);e.target.value=''};$('#saveBtn').onclick=save;$('#exportBtn').onclick=exportBackup;$('#backBtn').onclick=()=>{if(A.dirty&&!confirm('有未同步修改，仍要返回？'))return;location.href='index.html'};window.onbeforeunload=()=>A.dirty?'存在未同步修改':undefined;
</script></body></html>
