<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>本单位花名册</title><style>:root{--bg:#edf1ee;--panel:#fff;--text:#18211e;--muted:#6d7772;--line:#dbe2de;--green:#267a6a;--red:#b84738}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}.hidden{display:none!important}.lock{min-height:100dvh;display:grid;place-items:center;padding:20px}.card{width:min(100%,420px);background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px}.card h1{margin:0 0 7px;font-size:22px}.card p{color:var(--muted);font-size:13px;line-height:1.6}.card input,.search,select{width:100%;height:40px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:0 10px;font-size:14px}.btn{height:40px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:0 12px}.primary{background:#1f2925;border-color:#1f2925;color:#fff;width:100%;margin-top:10px}.top{position:sticky;top:0;z-index:5;background:rgba(248,250,248,.96);backdrop-filter:blur(15px);border-bottom:1px solid var(--line);padding:calc(11px + env(safe-area-inset-top)) 12px 11px}.toprow{display:flex;align-items:center;gap:8px}.top h1{font-size:18px;margin:0}.top .right{margin-left:auto;display:flex;gap:6px}.filters{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.filters .search{grid-column:1/-1}.summary{max-width:1000px;margin:12px auto 0;padding:0 12px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.metric{background:#fff;border:1px solid var(--line);border-radius:7px;padding:9px}.metric b{display:block;font-size:19px}.metric small{font-size:10px;color:var(--muted)}.workspace{max-width:1180px;margin:auto;padding:12px;display:grid;grid-template-columns:340px minmax(0,1fr);gap:12px}.panel{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}.panelhead{padding:11px;border-bottom:1px solid var(--line);color:var(--muted);font-size:12px}.people{max-height:calc(100dvh - 250px);overflow:auto}.person{width:100%;border:0;border-bottom:1px solid var(--line);background:#fff;text-align:left;padding:12px;cursor:pointer}.person.on{background:#edf5f2}.person b{font-size:14px}.person span{float:right;color:var(--green);font-size:11px}.person small{display:block;color:var(--muted);font-size:12px;margin-top:4px}.detail{padding:16px}.detailTitle{display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}.detailTitle h2{font-size:20px;margin:0}.detailTitle span{margin-left:auto;color:var(--green);font-size:12px}.sub{color:var(--muted);font-size:12px;margin-top:4px}.facts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.fact{background:#f6f8f6;border-radius:6px;padding:9px}.fact label{display:block;font-size:10px;color:var(--muted)}.fact span{display:block;font-size:13px;word-break:break-all}.cert{display:inline-block;background:#edf5f2;color:var(--green);padding:3px 5px;border-radius:4px;font-size:11px;margin:5px 3px 0 0}.empty{text-align:center;color:var(--muted);padding:50px 10px}.foot{text-align:center;color:var(--muted);font-size:11px;padding:12px}@media(max-width:760px){.workspace{grid-template-columns:1fr}.people{max-height:300px}.facts{grid-template-columns:1fr 1fr}.summary{grid-template-columns:repeat(2,1fr)}.toprow{flex-wrap:wrap}.top .right{width:100%;margin:2px 0 0}.top .right .btn{flex:1}}</style></head><body>
<section id="lock" class="lock"><form id="login" class="card"><h1>本单位花名册</h1><p>本页面与东方枢纽劳务数据独立加密。输入本单位查询密码后，仅在本机解密查看。</p><input id="password" type="password" placeholder="本单位查询密码" autocomplete="current-password"><button class="btn primary">解锁本单位花名册</button><p id="error"></p><a class="btn" href="company-admin.html" style="display:grid;place-items:center;text-decoration:none;color:inherit;margin-top:10px">本单位花名册管理</a><a class="btn" href="project.html" style="display:grid;place-items:center;text-decoration:none;color:inherit;margin-top:10px">东方枢纽一标段项目总管</a><a class="btn" href="index.html" style="display:grid;place-items:center;text-decoration:none;color:inherit;margin-top:10px">切换到共强铭富劳务资料</a></form></section>
<div id="app" class="hidden"><header class="top"><div class="toprow"><h1>本单位花名册</h1><div class="right"><button id="eyeBtn" class="btn">显示完整手机号</button><a class="btn" href="company-admin.html" style="text-decoration:none;color:inherit">管理</a><a class="btn" href="project.html" style="text-decoration:none;color:inherit">项目总管</a><a class="btn" href="index.html" style="text-decoration:none;color:inherit">劳务助手</a><button id="lockBtn" class="btn">锁定</button></div></div><div class="filters"><input id="search" class="search" placeholder="搜索姓名、部门、岗位、手机号、学校、证书"><select id="department"><option value="all">全部部门</option></select><select id="position"><option value="all">全部岗位</option></select><select id="education"><option value="all">全部学历</option></select><select id="educationMode"><option value="all">全部就学形式</option></select><select id="retirement"><option value="all">全部退休测算状态</option><option value="notDue">未到预计退休年份</option><option value="dueYear">退休临界年份</option><option value="pastDue">已到预计退休年份</option></select><select id="gender"><option value="all">全部性别</option><option value="男">男</option><option value="女">女</option></select><select id="employmentStatus"><option value="all">全部在离职状态</option><option value="在职">在职</option><option value="离职">离职</option></select></div></header><div id="summary" class="summary"></div><main class="workspace"><section class="panel"><div class="panelhead">点击人员查看完整资料</div><div id="list" class="people"></div></section><section id="detail" class="panel detail empty">请从左侧选择人员</section></main><div class="foot">出生年份按“原表年份−年龄+1”推算；因缺少出生月日，周岁为按年份估算，退休年龄/年份按2025年起渐进式延迟退休政策测算，可能显示区间；女性默认原55岁退休类别，可在管理页调整。结果不含弹性提前/延迟退休、特殊工种和缴费年限条件。</div></div>
<script>const $=s=>document.querySelector(s),b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0)),mask=v=>{const s=String(v||'');return s.length<7?s:s.slice(0,3)+'*******'+s.slice(-2)},APP={data:null,revealed:false,expanded:null};async function decrypt(e,p){const m=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']),k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(e.salt),iterations:e.iterations,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,['decrypt']),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(e.iv)},k,b64(e.ciphertext));return JSON.parse(new TextDecoder().decode(plain))}function allText(p){return[p.name,p.department,p.position,p.phone,p.nativePlace,p.school,p.education,p.major,Object.values(p.certificates||{}).join(' '),p.remark].join(' ').toLowerCase()}function liveYears(p,key){const src=p.sourceValues||{},base=Number(src.baseYear||p.ageBaseYear||new Date().getFullYear()),raw=Number(src[key]||0),delta=Math.max(0,new Date().getFullYear()-base);return raw?raw+delta:(p[key]||'')}function birthYear(p){const src=p.sourceValues||{};return Number(p.birthYearEstimated||(src.baseYear&&src.age?Number(src.baseYear)-Number(src.age)+1:0))}function ageInfo(p){const y=new Date().getFullYear(),b=birthYear(p);return{birthYear:b,age:b?y-b:0,virtualAge:b?y-b+1:0}}function retirementCategory(p){return p.retirementCategory||(p.sex==='男'?'male':'female55')}function categoryName(p){const c=retirementCategory(p);return c==='male'?'男职工':c==='female50'?'女职工·原50岁类':'女职工·原55岁类'}function fmtRetireAge(months){const y=Math.floor(months/12),m=months%12;return`${y}岁${m?m+'个月':''}`}function retirementEstimate(p){const by=birthYear(p),c=retirementCategory(p);if(!by)return{ageText:'无法推算',yearText:'无法推算',minYear:9999,maxYear:9999};const baseAge=c==='male'?60:c==='female50'?50:55,startYear=c==='male'?1965:c==='female50'?1975:1970,step=c==='female50'?2:4,cap=c==='female50'?60:36,ages=[],years=[];for(let month=1;month<=12;month++){const idx=(by-startYear)*12+month-1,delay=idx<0?0:Math.min(cap,Math.floor(idx/step)+1),ageMonths=baseAge*12+delay,retireIndex=by*12+month-1+ageMonths;ages.push(ageMonths);years.push(Math.floor(retireIndex/12))}const minAge=Math.min(...ages),maxAge=Math.max(...ages),minYear=Math.min(...years),maxYear=Math.max(...years);return{ageText:minAge===maxAge?fmtRetireAge(minAge):fmtRetireAge(minAge)+'—'+fmtRetireAge(maxAge),yearText:minYear===maxYear?String(minYear):`${minYear}—${maxYear}`,minYear,maxYear}}function retirementStatus(p){const e=retirementEstimate(p),y=new Date().getFullYear();return y<e.minYear?'notDue':y>e.maxYear?'pastDue':'dueYear'}function retirementStatusName(p){const s=retirementStatus(p);return s==='notDue'?'未到预计退休年份':s==='dueYear'?'退休临界年份':'已到预计退休年份'}function render(){const q=$('#search').value.trim().toLowerCase(),dep=$('#department').value,pos=$('#position').value,edu=$('#education').value,mode=$('#educationMode').value,ret=$('#retirement').value,gender=$('#gender').value,emp=$('#employmentStatus').value,rows=APP.data.people.filter(p=>(dep==='all'||p.department===dep)&&(pos==='all'||p.position===pos)&&(edu==='all'||p.education===edu)&&(mode==='all'||p.educationMode===mode)&&(ret==='all'||retirementStatus(p)===ret)&&(gender==='all'||p.sex===gender)&&(emp==='all'||(p.employmentStatus||'在职')===emp)&&(!q||allText(p).toLowerCase().includes(q)));$('#summary').innerHTML=[[APP.data.records,'人员档案'],[APP.data.people.filter(p=>retirementStatus(p)!=='notDue').length,'已到/临界退休年份'],[new Set(APP.data.people.map(p=>p.department).filter(Boolean)).size,'部门'],[rows.length,'当前结果']].map(x=>`<div class="metric"><b>${x[0]}</b><small>${x[1]}</small></div>`).join('');$('#list').innerHTML=rows.map(p=>{const key=String(p.id||p.name),on=APP.expanded===key;return`<button class="person ${on?'on':''}" data-person="${key.replaceAll('"','&quot;')}"><b>${p.name}</b><span>${p.employmentStatus||'在职'}</span><small>${p.department||'未分部门'} · ${p.position||p.mgmtPosition||'岗位未录入'} · ${retirementStatusName(p)}</small></button>`}).join('')||'<div class="empty">没有匹配人员</div>';document.querySelectorAll('.person[data-person]').forEach(el=>el.onclick=()=>{APP.expanded=el.dataset.person;render()});const p=rows.find(x=>String(x.id||x.name)===APP.expanded);if(!p){$('#detail').className='panel detail empty';$('#detail').innerHTML='请从左侧选择人员'}else{const certs=Object.entries(p.certificates||{}).filter(x=>x[1]).map(x=>`<span class="cert">${x[1]}</span>`).join('');$('#detail').className='panel detail';$('#detail').innerHTML=`<div class="detailTitle"><div><h2>${p.name}</h2><div class="sub">${p.department||'未分部门'} · ${p.position||p.mgmtPosition||'岗位未录入'} · ${p.sex||''} · ${p.nativePlace||''}</div></div><span>${p.employmentStatus||'在职'}</span></div><div class="facts"><div class="fact"><label>手机号</label><span>${APP.revealed?p.phone:mask(p.phone)}</span></div><div class="fact"><label>身份证号</label><span>${APP.revealed?(p.idCard||'未录入'):mask(p.idCard)}</span></div><div class="fact"><label>管理职务</label><span>${p.mgmtPosition||p.position||'未录入'}</span></div><div class="fact"><label>所属单位</label><span>${p.mgmtUnit||p.department||'未录入'}</span></div><div class="fact"><label>车牌号</label><span>${p.plate||'未录入'}</span></div><div class="fact"><label>年龄</label><span>${ageInfo(p).age||'未录入'}周岁 · 虚岁${ageInfo(p).virtualAge||'—'}岁</span></div><div class="fact"><label>预计法定退休年龄</label><span>${retirementEstimate(p).ageText} · ${categoryName(p)}</span></div><div class="fact"><label>预计退休年份</label><span>${retirementEstimate(p).yearText}年</span></div><div class="fact"><label>工龄 / 本单位年限</label><span>${liveYears(p,'experienceYears')||'—'}年 / ${liveYears(p,'yearsInCompany')||'—'}年</span></div><div class="fact"><label>学历层次</label><span>${p.education||'未录入'} · ${p.degree||''}</span></div><div class="fact"><label>就学形式</label><span>${p.educationMode||'未录入'}</span></div><div class="fact"><label>专业</label><span>${p.major||'未录入'}</span></div><div class="fact"><label>学校</label><span>${p.school||'未录入'}</span></div></div>${certs?`<div>${certs}</div>`:''}${p.remark?`<div class="sub">备注：${p.remark}</div>`:''}`}}$('#login').onsubmit=async e=>{e.preventDefault();$('#error').textContent='正在解密…';try{const raw=await fetch('https://dongfang-labor-admin.a15221082942.workers.dev/api/company-state?t='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('公司密文尚未发布');return r.json()});APP.data=await decrypt(raw,$('#password').value);$('#lock').classList.add('hidden');$('#app').classList.remove('hidden');$('#department').innerHTML='<option value="all">全部部门</option>'+APP.data.availableDepartments.map(x=>`<option>${x}</option>`).join('');$('#position').innerHTML='<option value="all">全部岗位</option>'+APP.data.availablePositions.map(x=>`<option>${x}</option>`).join('');const educations=[...new Set(APP.data.people.map(p=>p.education).filter(Boolean))].sort();$('#education').innerHTML='<option value="all">全部学历</option>'+educations.map(x=>`<option>${x}</option>`).join('');const modes=[...new Set(APP.data.people.map(p=>p.educationMode).filter(Boolean))].sort();$('#educationMode').innerHTML='<option value="all">全部就学形式</option>'+modes.map(x=>`<option>${x}</option>`).join('');render()}catch(err){$('#error').textContent=err.message||'密码错误或数据加载失败'}};$('#search').oninput=render;$('#department').onchange=render;$('#position').onchange=render;$('#education').onchange=render;$('#educationMode').onchange=render;$('#retirement').onchange=render;$('#gender').onchange=render;$('#employmentStatus').onchange=render;$('#eyeBtn').onclick=()=>{APP.revealed=!APP.revealed;$('#eyeBtn').textContent=APP.revealed?'隐藏手机号':'显示完整手机号';render()};$('#lockBtn').onclick=()=>{APP.data=null;APP.revealed=false;$('#eyeBtn').textContent='显示完整手机号';$('#app').classList.add('hidden');$('#lock').classList.remove('hidden');$('#password').value=''};</script></body></html>
