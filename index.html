function privateValue(value,kind='text'){if(revealed)return value||'未录入';if(kind==='phone'||kind==='id'||kind==='bank')return mask(value);return '***'}
function renderDetail(){if(!currentDetail)return;const {u,p}=currentDetail,med=medicalInfo(p);$('#detailName').textContent=revealed?p.name:maskName(p.name);$('#detailSub').textContent=`${u.name} · ${p.trade} · ${p.status}${med.focus?' · 重点关注':''}`;const pays=[...(p.payrollHistory||[])].sort((a,b)=>b.month.localeCompare(a.month)),attendances=[...(p.attendanceHistory||[])].sort((a,b)=>(b.month||'').localeCompare(a.month||'')),certs=p.certificates||[],hist=(p.statusHistory||[]),timelineHtml=hist.length?`<div class="section-title">进退场历史</div><div class="timeline">${hist.map(e=>`<div class="tl-row"><span class="tl-dot ${e.type}"></span><b>${e.type==='entry'?'进场':'退场'}</b> ${revealed?(e.date||'未录入'):'***'}${e.note?`<small>${revealed?e.note:''}</small>`:''}</div>`).join('')}</div>`:'';$('#detail').innerHTML=`<div class="section-title">人员信息</div><div class="facts">${[['年龄',med.age===null?'未知':`${med.age}岁${med.focus?' · 重点关注':''}`],['出生日期',privateValue(birthDate(p))],['手机号',privateValue(p.phone,'phone')],['身份证',privateValue(p.idCard,'id')],['银行卡',privateValue(p.bankCard,'bank')],['开户行',privateValue(p.bank)],['日薪',privateValue(p.dailyRate?money(p.dailyRate)+'/天':'')],['进场',privateValue(p.entryDate)],['退场',privateValue(p.exitDate||'未退场')],['体检周期',med.focus?'6个月 · 一年两检':'12个月 · 一年一检'],['上次体检',privateValue(p.medicalDate)],['下次体检',revealed?(med.due||'未录入'):(med.overdue?'已逾期':p.medicalDate?'有效':'未录入')]].map(x=>`<div class="fact"><label>${x[0]}</label><span class="${x[0]==='年龄'&&med.focus?'age-focus':x[0]==='下次体检'&&med.overdue?'medical-overdue':''}">${x[1]}</span></div>`).join('')}</div>${timelineHtml}<div class="section-title">月度考勤</div><table class="history"><thead><tr><th>月份</th><th>考勤周期</th><th>出勤天数</th><th>加班</th><th>备注</th></tr></thead><tbody>${attendances.map(x=>`<tr><td>${x.month||'未录入'}</td><td>${x.period||'未录入'}</td><td>${x.actualDays??'—'} 天</td><td>${Number(x.overtimeHours||0)?x.overtimeHours+' 小时':'—'}</td><td>${x.note||'—'}</td></tr>`).join('')||'<tr><td colspan="5" class="empty">暂无考勤记录</td></tr>'}</tbody></table><div class="section-title">工资历史</div><table class="history"><thead><tr><th>月份</th><th>工资分项 / 应发实发</th><th>状态</th></tr></thead><tbody>${pays.map(x=>{const split=x.componentsEntered===true||(x.componentsEntered!==false&&['baseAmount','performanceAmount','heatAllowance','otherAdditions','deductions'].some(k=>x[k]!==undefined&&x[k]!==null&&x[k]!==''));return`<tr><td>${x.month}</td><td>${revealed?(split?`基本 ${money(x.baseAmount||0)} · 绩效 ${money(x.performanceAmount||0)} · 高温费 ${money(x.heatAllowance||0)}<br><small>其他 +${money(x.otherAdditions||0)} · 扣款 -${money(x.deductions||0)}</small><br><b>应发 ${money(expectedValue(x))} / 实发 ${money(paidValue(x))}</b>`:`应发 ${money(expectedValue(x))} / 实发 ${money(paidValue(x))}<br><small>历史数据：工资分项未录入</small>`):'***'}</td><td>${x.status}</td></tr>`}).join('')||'<tr><td colspan="3" class="empty">暂无工资记录</td></tr>'}</tbody></table><div class="section-title">证书资质</div><table class="history"><thead><tr><th>证书 / 操作类别</th><th>编号 / 发证机关</th><th>发证 / 有效期</th></tr></thead><tbody>${certs.map(x=>`<tr><td>${x.type}<br><small>${revealed?(x.operation||'未录入'):'***'}</small><br>${x.attachment?(revealed?`<button class="cert-open" onclick="openCertificate('${x.attachment}')">查看PDF原件</button>`:'<button class="cert-open" disabled>解锁眼睛后查看</button>'):''}</td><td>${revealed?(x.number||'未录入'):'***'}<br><small>${revealed?(x.issuer||'未录入'):'***'}</small></td><td>${revealed?(x.issueDate||'未录入'):'***'}<br><small>${revealed?'至 '+(x.expiryDate||'未录入'):'***'}</small></td></tr>`).join('')||'<tr><td colspan="3" class="empty">暂无证书记录</td></tr>'}</tbody></table>`}
