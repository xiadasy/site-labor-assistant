<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="东方劳务"><meta name="theme-color" content="#1f2925"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="app-icon.png"><title>东方枢纽劳务助手</title><style>
:root{color-scheme:light;--bg:#e9eeeb;--panel:#fff;--text:#18211e;--muted:#707873;--line:#dce3df;--green:#267a6a;--orange:#e77728;--red:#b84738}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;letter-spacing:0}.hidden{display:none!important}.lock{min-height:100dvh;display:grid;place-items:center;padding:24px}.login{width:min(100%,360px);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:22px}.mark{width:48px;height:48px;border-radius:8px;background:var(--green);display:grid;place-items:center;color:#fff;font-size:24px;font-weight:800}.login h1{font-size:21px;margin:16px 0 4px}.login p{font-size:13px;color:var(--muted);line-height:1.55;margin:0 0 18px}.login input{width:100%;height:44px;border:1px solid var(--line);border-radius:6px;padding:0 12px;font-size:16px}.primary{width:100%;height:44px;border:0;border-radius:6px;background:#1f2925;color:#fff;font-size:15px;font-weight:650;margin-top:10px}.error{height:20px;color:var(--red);font-size:12px;margin-top:8px}.top{padding:calc(12px + env(safe-area-inset-top)) 14px 11px;background:rgba(247,249,247,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.title-row{display:flex;align-items:center}.title-row h1{font-size:19px;margin:0}.title-row button{margin-left:auto}.meta{font-size:11px;color:var(--muted);margin-top:2px}.controls{display:grid;grid-template-columns:100px 1fr 38px;gap:7px;margin-top:11px}.controls-secondary{display:grid;grid-template-columns:140px 1fr;gap:7px;margin-top:7px}select,input,.icon{height:38px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--text);font-size:13px;min-width:0}.controls select,.controls input,.controls-secondary select,.controls-secondary input{padding:0 9px}.icon{width:38px;padding:0;display:grid;place-items:center}.icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.wrap{max-width:1000px;margin:auto;padding:12px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);background:var(--line);gap:1px;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-bottom:12px}.metric{background:var(--panel);padding:11px}.metric b{display:block;font-size:19px}.metric span{font-size:10px;color:var(--muted)}.unit{background:var(--panel);border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-bottom:11px}.unit-head{padding:11px 12px;display:flex;align-items:center}.unit-head i{width:5px;height:21px;border-radius:2px;margin-right:8px}.unit-head b{font-size:16px}.unit-head small{color:var(--muted);margin-left:7px}.unit-head strong{color:var(--orange);margin-left:auto;font-size:13px}.note{padding:7px 12px;background:#f7f9f7;color:var(--muted);font-size:11px}.table-wrap{overflow:auto}table{width:100%;min-width:1080px;border-collapse:collapse}th,td{text-align:left;padding:9px 11px;border-top:1px solid var(--line);font-size:12px}th{color:var(--muted);font-weight:500}.person{border:0;background:transparent;padding:0;color:var(--text);text-align:left;font-weight:700;font-size:12px}.person small{display:block;color:var(--muted);font-weight:400;margin-top:2px}.active{color:var(--green);font-weight:700}.exit{color:var(--red);font-weight:700}.private{color:var(--muted)}.tag{display:inline-block;padding:2px 5px;border-radius:4px;background:#edf4f1;color:var(--green);font-size:10px;margin:1px}.drawer{position:fixed;inset:0;z-index:10;background:rgba(10,16,13,.4);display:flex;align-items:flex-end}.sheet{width:100%;max-height:88dvh;overflow:auto;background:var(--panel);border-radius:10px 10px 0 0;padding:18px 15px calc(18px + env(safe-area-inset-bottom))}.sheet-head{display:flex;align-items:flex-start}.sheet h2{margin:0;font-size:20px}.sheet-head button{margin-left:auto}.sub{color:var(--muted);font-size:12px;margin-top:3px}.section-title{font-size:12px;color:var(--muted);margin:18px 0 7px}.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:6px;overflow:hidden}.fact{padding:9px;border-bottom:1px solid var(--line)}.fact:nth-child(odd){border-right:1px solid var(--line)}.fact label{display:block;color:var(--muted);font-size:10px}.fact span{font-size:12px;word-break:break-all}.history{width:100%;min-width:0}.empty{padding:16px;color:var(--muted);text-align:center}.foot{text-align:center;color:var(--muted);font-size:10px;padding:8px 0 20px}@media(min-width:760px){.drawer{align-items:center;justify-content:center}.sheet{width:620px;border-radius:8px;max-height:84vh}}
</style></head><body>
<section id="lock" class="lock"><form id="login" class="login"><div class="mark">劳</div><h1>东方枢纽劳务助手</h1><p>人员、工资历史与证书资料已加密。输入查询密码后在本机解密。</p><input id="password" type="password" autocomplete="current-password" placeholder="查询密码"><button class="primary">解锁查询</button><div id="error" class="error"></div></form></section>
<div id="app" class="hidden"><header class="top"><div class="title-row"><div><h1>东方枢纽劳务助手</h1><div id="meta" class="meta"></div></div><button id="lockBtn" class="icon" title="锁定">锁</button></div><div class="controls"><select id="unit"></select><select id="month"></select><button id="eye" class="icon" title="显示完整信息"></button></div><div class="controls-secondary"><select id="certificate"></select><input id="search" placeholder="姓名、手机、证书编号"></div></header><main class="wrap"><div class="metrics"><div class="metric"><b id="activeCount">0</b><span>当前在场</span></div><div class="metric"><b id="recordCount">0</b><span>筛选人员</span></div><div class="metric"><b id="payrollTotal">¥0</b><span id="payrollLabel">6月工资</span></div></div><div id="units"></div><div class="foot">点击姓名查看完整人员档案、工资历史与证书</div></main></div>
<div id="drawer" class="drawer hidden"><section class="sheet"><div class="sheet-head"><div><h2 id="detailName"></h2><div id="detailSub" class="sub"></div></div><button id="close" class="icon">×</button></div><div id="detail"></div></section></div>
<script>
const $=s=>document.querySelector(s),money=n=>`¥${Number(n||0).toLocaleString('zh-CN')}`,mask=(v,h=3,t=4)=>!v?'未录入':`${String(v).slice(0,h)}********${String(v).slice(-t)}`;let data,revealed=false;
const eyeOpen='<svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>',eyeClosed='<svg viewBox="0 0 24 24"><path d="m3 3 18 18"/><path d="M10 5.2A11 11 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-2.2 3.2M6.6 6.6C3.6 8.5 2 12 2 12s3.5 7 10 7c1.8 0 3.3-.5 4.6-1.2"/></svg>';
function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}async function decrypt(password){const e=await fetch(`encrypted-data.json?t=${Date.now()}`,{cache:'no-store'}).then(r=>r.json()),material=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']),key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(e.salt),iterations:e.iterations,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt']),plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(e.iv)},key,b64(e.ciphertext));return JSON.parse(new TextDecoder().decode(plain))}
$('#login').onsubmit=async e=>{e.preventDefault();$('#error').textContent='正在解密…';try{data=await decrypt($('#password').value);$('#password').value='';$('#lock').classList.add('hidden');$('#app').classList.remove('hidden');setup()}catch(err){$('#error').textContent='密码不正确或数据加载失败'}};
function setup(){$('#meta').textContent=`花名册 ${data.project.rosterVersion} · 数据 ${data.project.updatedAt}`;$('#unit').innerHTML='<option value="all">全部单位</option>'+data.units.map(u=>`<option value="${u.id}">${u.name}</option>`).join('');$('#month').innerHTML=(data.availableMonths||[]).map(m=>`<option value="${m}">${Number(m.slice(5))}月工资</option>`).join('');$('#month').value=(data.availableMonths||['2026-06'])[0];$('#certificate').innerHTML='<option value="all">全部证书</option>'+(data.certificateTypes||[]).map(t=>`<option value="${t}">${t.replace('建设施工','')}</option>`).join('')+'<option value="none">无证书</option>';$('#eye').innerHTML=eyeOpen;render()}
function selected(){return $('#unit').value==='all'?data.units:data.units.filter(u=>u.id===$('#unit').value)}function payrollForPerson(p,month){return (p.payrollHistory||[]).find(x=>x.month===month)}function payrollForUnit(u,month){return (u.payrollHistory||[]).find(x=>x.month===month)}
function render(){const us=selected(),month=$('#month').value,cert=$('#certificate').value,q=$('#search').value.trim().toLowerCase(),matches=p=>{const certOk=cert==='all'||(cert==='none'?!(p.certificates||[]).length:(p.certificates||[]).some(c=>c.type===cert));const qOk=!q||[p.name,p.trade,p.phone,...(p.certificates||[]).flatMap(c=>[c.type,c.number,c.operation])].join(' ').toLowerCase().includes(q);return certOk&&qOk},ps=us.flatMap(u=>u.people).filter(matches);$('#activeCount').textContent=ps.filter(p=>p.status==='在场').length;$('#recordCount').textContent=ps.length;$('#payrollTotal').textContent=money(us.reduce((s,u)=>s+(payrollForUnit(u,month)?.total||0),0));$('#payrollLabel').textContent=`${Number(month.slice(5))}月工资`;$('#units').innerHTML=us.map(u=>unitHtml(u,q,cert,month)).join('')}
function unitHtml(u,q,cert,month){const ps=u.people.filter(p=>{const certOk=cert==='all'||(cert==='none'?!(p.certificates||[]).length:(p.certificates||[]).some(c=>c.type===cert));const qOk=!q||[p.name,p.trade,p.phone,...(p.certificates||[]).flatMap(c=>[c.type,c.number,c.operation])].join(' ').toLowerCase().includes(q);return certOk&&qOk}),summary=payrollForUnit(u,month);return `<section class="unit"><div class="unit-head"><i style="background:${u.color}"></i><b>${u.name}</b><small>${ps.length}人</small><strong>${summary?money(summary.total):'暂无资料'}</strong></div><div class="note">${Number(month.slice(5))}月工资 · ${summary?`发放 ${summary.peopleCount} 人`:'暂无代发资料'} · 证书 ${ps.reduce((s,p)=>s+(p.certificates||[]).length,0} 本</div><div class="table-wrap"><table><thead><tr><th>姓名 / 工种</th><th>状态</th><th>进退场</th><th>日薪</th><th>${Number(month.slice(5))}月工资</th><th>证书</th><th>手机</th><th>身份证</th><th>银行卡</th></tr></thead><tbody>${ps.map(p=>row(p,u,month)).join('')||'<tr><td colspan="9" class="empty">没有匹配人员</td></tr>'}</tbody></table></div></section>`}
function row(p,u,month){const pay=payrollForPerson(p,month),certs=(p.certificates||[]).map(c=>`<span class="tag">${c.type.replace('建设施工','')}</span>`).join('')||'无';return `<tr><td><button class="person" onclick="detailPerson('${u.id}','${p.idCard}')">${p.name}<small>${p.trade}</small></button></td><td class="${p.status==='在场'?'active':'exit'}">${p.status}</td><td>${p.entryDate||'未录入'}${p.exitDate?`<small>退 ${p.exitDate}</small>`:''}</td><td>${p.dailyRate?money(p.dailyRate)+'/天':'未录入'}</td><td>${pay?money(pay.amount):'未发放'}</td><td>${certs}</td><td class="private">${revealed?(p.phone||'未录入'):mask(p.phone)}</td><td class="private">${revealed?(p.idCard||'未录入'):mask(p.idCard)}</td><td class="private">${revealed?(p.bankCard||'未录入'):mask(p.bankCard)}</td></tr>`}
window.detailPerson=(uid,id)=>{const u=data.units.find(x=>x.id===uid),p=u.people.find(x=>x.idCard===id);$('#detailName').textContent=p.name;$('#detailSub').textContent=`${u.name} · ${p.trade} · ${p.status}`;const pays=[...(p.payrollHistory||[])].sort((a,b)=>b.month.localeCompare(a.month)),certs=p.certificates||[];$('#detail').innerHTML=`<div class="section-title">人员信息</div><div class="facts">${[['手机号',p.phone],['身份证',p.idCard],['银行卡',p.bankCard],['开户行',p.bank],['日薪',p.dailyRate?money(p.dailyRate)+'/天':''],['进场',p.entryDate],['退场',p.exitDate||'未退场'],['体检',p.medicalDate]].map(x=>`<div class="fact"><label>${x[0]}</label><span>${x[1]||'未录入'}</span></div>`).join('')}</div><div class="section-title">工资历史</div><table class="history"><thead><tr><th>月份</th><th>金额</th><th>状态</th></tr></thead><tbody>${pays.map(x=>`<tr><td>${x.month}</td><td>${money(x.amount)}</td><td>${x.status}</td></tr>`).join('')||'<tr><td colspan="3" class="empty">暂无工资记录</td></tr>'}</tbody></table><div class="section-title">证书资质</div><table class="history"><thead><tr><th>证书 / 操作类别</th><th>编号 / 发证机关</th><th>发证 / 有效期</th></tr></thead><tbody>${certs.map(x=>`<tr><td>${x.type}<br><small>${x.operation||'未录入'}</small></td><td>${x.number||'未录入'}<br><small>${x.issuer||'未录入'}</small></td><td>${x.issueDate||'未录入'}<br><small>至 ${x.expiryDate||'未录入'}</small></td></tr>`).join('')||'<tr><td colspan="3" class="empty">暂无证书记录</td></tr>'}</tbody></table>`;$('#drawer').classList.remove('hidden')};
$('#unit').onchange=render;$('#month').onchange=render;$('#certificate').onchange=render;$('#search').oninput=render;$('#eye').onclick=()=>{revealed=!revealed;$('#eye').innerHTML=revealed?eyeClosed:eyeOpen;render()};$('#close').onclick=()=>$('#drawer').classList.add('hidden');$('#drawer').onclick=e=>{if(e.target===$('#drawer'))$('#drawer').classList.add('hidden')};$('#lockBtn').onclick=()=>{data=null;revealed=false;$('#app').classList.add('hidden');$('#lock').classList.remove('hidden');$('#error').textContent=''};if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script></body></html>
